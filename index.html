<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:linear-gradient(160deg,#0d0d14 0%,#10101a 50%,#1a1a24 100%);background-attachment:fixed;color:#dcddde;font-family:'Poppins',sans-serif;font-size:14px}
#app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;border-left:1px solid #ffffff0a;border-right:1px solid #ffffff0a}
.hdr{background:#0d0d13;padding:0 14px 16px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;position:sticky;top:0;z-index:50}
.htitle{text-align:center;font-size:24px;font-weight:700;letter-spacing:2px;color:#fff;padding-top:28px;padding-bottom:28px;margin-bottom:0;text-transform:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@keyframes glowPulse{0%,100%{text-shadow:0 0 8px rgba(114,137,218,0.3)}50%{text-shadow:0 0 16px rgba(114,137,218,0.6),0 0 28px rgba(114,137,218,0.2)}}
.htitle em{color:#7289da;font-style:normal;font-weight:800;animation:glowPulse 3s ease-in-out infinite}
.wow-badge{font-size:9px;background:#ff7d0a20;color:#ff7d0a;border:1px solid #ff7d0a44;border-radius:10px;padding:2px 8px;font-weight:700;margin-left:6px;vertical-align:middle}
.srow{display:flex;align-items:center;background:#1e1e2a;border-radius:8px;padding:7px 12px;margin-top:4px;margin-bottom:12px;border:1px solid #ffffff0d;gap:8px}
.srow input{background:none;border:none;outline:none;color:#dcddde;font-size:13px;flex:1;font-family:inherit}
.srow input::placeholder{color:#44445a}
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{background:#1e1e2a;border:1px solid #ffffff0d;border-radius:20px;padding:4px 14px;font-size:11px;color:#55556a;cursor:pointer;white-space:nowrap;user-select:none;flex-shrink:0}
.cat.on{background:#5865f228;border-color:#5865f255;color:#a5b4fc;font-weight:600}
.content{flex:1;padding:24px 14px 14px;overflow-y:auto}
.nav{display:flex;background:#0d0d13ee;border-top:1px solid #ffffff0d;flex-shrink:0;position:sticky;bottom:0;z-index:50}
.nb{flex:1;padding:20px 4px;cursor:pointer;border:none;background:none;color:#44445a;font-size:12px;font-weight:500;font-family:inherit;border-right:1px solid #ffffff0d;white-space:nowrap;text-align:center;transition:color .15s}
.nb:last-child{border-right:none}
.nb.on{color:#7289da;font-weight:700;position:relative}.nb.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:linear-gradient(90deg,#5865f2,#7289da);border-radius:0 0 3px 3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:linear-gradient(180deg,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0) 100%);border-radius:12px;border:1px solid rgba(255,255,255,0.08);margin-bottom:10px;position:relative;overflow:hidden;animation:fadeUp .3s ease both;transition:transform .15s,box-shadow .15s;cursor:pointer}.card:active{transform:scale(0.975);box-shadow:none!important}

function getResetCountdown(){
  var now=new Date();
  // WoW EU Reset: Mittwoch 04:00 Uhr
  var next=new Date(now);
  var day=now.getDay(); // 0=So,1=Mo,2=Di,3=Mi,4=Do,5=Fr,6=Sa
  var daysUntilWed=(3-day+7)%7;
  if(daysUntilWed===0&&now.getHours()>=4)daysUntilWed=7;
  next.setDate(now.getDate()+daysUntilWed);
  next.setHours(4,0,0,0);
  var diff=next-now;
  var h=Math.floor(diff/3600000);
  var m=Math.floor((diff%3600000)/60000);
  if(h>=48){var d=Math.floor(h/24);return d+'d '+( h%24)+'h'}
  if(h>=1)return h+'h '+m+'m';
  return m+'m';
}

function checkWeeklyReset(){
  var KEY_RESET='gl_last_reset';
  var now=new Date();
  // Nächster vergangener Reset: Mittwoch 04:00
  var day=now.getDay();
  var lastReset=new Date(now);
  var daysBack=(day-3+7)%7; // Tage seit letztem Mittwoch
  if(daysBack===0&&now.getHours()<4)daysBack=7;
  lastReset.setDate(now.getDate()-daysBack);
  lastReset.setHours(4,0,0,0);
  var lastResetTs=lastReset.getTime();
  var stored=parseInt(localStorage.getItem(KEY_RESET)||'0');
  if(stored<lastResetTs){
    // Reset durchführen
    localStorage.setItem(KEY_RESET,String(lastResetTs));
    if(stored>0){
      // Nur wenn vorher schon mal gespeichert (nicht erster Start)
      S.wtodos={};
      S.weekly={};
      S.dungeons={};
      saveS();
      // Kurze Meldung
      setTimeout(function(){
        var t=dv('');
        styl(t,{position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',background:'#1a1a28',border:'1px solid #5865f244',borderRadius:'10px',padding:'10px 18px',fontSize:'12px',color:'#a5b4fc',zIndex:9999,whiteSpace:'nowrap',boxShadow:'0 4px 20px #00000088'});

        document.body.appendChild(t);
        setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t)},3500);
      },1800);
    }
  }
}


function drawShareCard(cid){
  var ch=S.chars.find(function(x){return x.id===cid});
  if(!ch)return;
  var c=ci(ch.cls),g=gi(ch.game),w=S.weekly[cid]||{};

  var ctx=canvas.getContext('2d');
  ctx.scale(2,2);

  // Hintergrund
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0d0d14');bg.addColorStop(1,'#1a1a24');
  ctx.fillStyle=bg;
  roundRect(ctx,0,0,W,H,16);ctx.fill();

  var grd=ctx.createRadialGradient(60,H/2,10,60,H/2,120);
  grd.addColorStop(0,c.c+'18');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

  var fg2=dv('fg');fg2.appendChild(mk('label','fl','Ziel / Quest'));var ti=inpEl('text',f.title,'z.B. M+15 abschließen','fi');ti.oninput=function(e){f.title=e.target.value};fg2.appendChild(ti);wrap.appendChild(fg2);

  wrap.appendChild(bt('bp','✓  Ziel speichern',function(){if(!f.title.trim())return;set({goals:[Object.assign({},f,{id:'g'+Date.now(),done:false})].concat(S.goals),modal:null,page:sw?'weekly':'goals'})}));

function mEditChar(){
  var ch=S.chars.find(function(x){return x.id===S.editId});
  if(!ch)return dv('modal');
  var f=Object.assign({},ch);
  var wrap=dv('modal');wrap.appendChild(mk('div','mtit','Charakter bearbeiten'));
  function rb(){
    while(wrap.children.length>1)wrap.removeChild(wrap.lastChild);
    var ww=iw(f.game),c=ci(f.cls),g=gi(f.game);
    var fg1=dv('fg');fg1.appendChild(mk('label','fl','Name'));
    var ni=inpEl('text',f.name,'Name','fi');ni.oninput=function(e){f.name=e.target.value};fg1.appendChild(ni);wrap.appendChild(fg1);
    if(ww){
      var fg2=dv('fg');fg2.appendChild(mk('label','fl','Klasse'));var pw=dv('');
      function rp(){pw.innerHTML='';pw.appendChild(cpickerEl(f.cls,function(k){f.cls=k;rp()}));var sc=ci(f.cls);var h=mk('div','hint','● '+sc.n);h.style.color=sc.c;pw.appendChild(h)}
      rp();fg2.appendChild(pw);wrap.appendChild(fg2);
      var fg3=dv('fg');fg3.appendChild(mk('label','fl','iLvl & M+ Score'));
      var row2=dv('edit-row');
      var ii=inpEl('number',f.ilvl||'','iLvl','fi-sm');ii.oninput=function(e){f.ilvl=e.target.value};
      var si2=inpEl('number',f.mscore||'','M+ Score','fi-sm');si2.oninput=function(e){f.mscore=e.target.value};
      ap(row2,ii,si2);fg3.appendChild(row2);wrap.appendChild(fg3);
      var fgPe=dv('fg');fgPe.appendChild(mk('label','fl','Berufe'));
      var profRowE=dv('');styl(profRowE,{display:'flex',gap:'8px'});
      var pe1=selEl([{v:'',l:'— Beruf 1 —'}].concat(PROFS.map(function(p){return{v:p,l:p}})),f.prof1||'');
      var pe2=selEl([{v:'',l:'— Beruf 2 —'}].concat(PROFS.map(function(p){return{v:p,l:p}})),f.prof2||'');
      pe1.style.flex='1';pe2.style.flex='1';
      pe1.onchange=function(e){f.prof1=e.target.value};
      pe2.onchange=function(e){f.prof2=e.target.value};
      ap(profRowE,pe1,pe2);fgPe.appendChild(profRowE);wrap.appendChild(fgPe);
      var fgRaceE=dv('fg');fgRaceE.appendChild(mk('label','fl','Rasse'));
      var rse=selEl([{v:'',l:'— Rasse wählen —'}].concat(raceList().map(function(r){return{v:r.v,l:r.l}})),f.race||'');
      rse.onchange=function(e){f.race=e.target.value};fgRaceE.appendChild(rse);wrap.appendChild(fgRaceE);
    }else{
      var fg4=dv('fg');fg4.appendChild(mk('label','fl','Klasse / Rolle'));
      var ri=inpEl('text',f.role||'','z.B. Tank','fi');ri.oninput=function(e){f.role=e.target.value};fg4.appendChild(ri);wrap.appendChild(fg4);
    }
    wrap.appendChild(bt('bp','✓  Speichern',function(){
      if(!f.name.trim())return;
      var oldChar=S.chars.find(function(x){return x.id===f.id});if(oldChar&&oldChar.ilvl)f.prevIlvl=oldChar.ilvl;set({chars:S.chars.map(function(x){return x.id===f.id?f:x}),modal:null,editId:null});
    }));
    wrap.appendChild(bt('bs','Abbrechen',function(){set({modal:null,editId:null})}));
  }
  rb();return wrap;
}

function modalGold(cid){
  var ch=S.chars.find(function(x){return x.id===cid});
  if(!ch)return dv('modal');
  var wrap=dv('modal');
  var title=mk('div','mtit','💰 Gold — '+ch.name);
  wrap.appendChild(title);
  var lbl=mk('div','fl','Aktuelles Gold');lbl.style.marginBottom='4px';wrap.appendChild(lbl);
  var inputWrap=dv('gold-input-wrap');
  var inp=document.createElement('input');
  inp.type='number';inp.className='gold-input';inp.value=ch.gold||'0';inp.placeholder='0';inp.min='0';
  inputWrap.appendChild(inp);wrap.appendChild(inputWrap);
  // Schnell-Buttons
  var ql=mk('div','fl','Schnell hinzufügen');ql.style.marginBottom='6px';wrap.appendChild(ql);
  var quickRow=dv('gold-quick');
  [1000,5000,10000,50000,100000].forEach(function(v){
    var qb=bt('gold-qbtn','+'+v.toLocaleString('de-DE')+'g',function(){
      var cur=parseInt(inp.value)||0;
      inp.value=String(cur+v);
    });
    quickRow.appendChild(qb);
  });
  wrap.appendChild(quickRow);
  wrap.appendChild(bt('bp','💰 Speichern',function(){
    var val=Math.max(0,parseInt(inp.value)||0);
    set({chars:S.chars.map(function(x){return x.id===cid?Object.assign({},x,{gold:String(val)}):x}),modal:null,goldCharId:null});
  }));
  wrap.appendChild(bt('bs','Abbrechen',function(){set({modal:null,goldCharId:null})}));
  return wrap;
}


function pgStats(){
  var wrap=dv('');
  var hdr=dv('rowhdr');ap(hdr,sp('ptitle','Statistiken'));wrap.appendChild(hdr);
  var wowChars=S.chars.filter(function(c){return iw(c.game)});
  var allChars=S.chars;
  if(!allChars.length){
    var em=dv('empty');ap(em,mk('div','','📊'),mk('p','','Noch keine Charaktere vorhanden.'));wrap.appendChild(em);return wrap;
  }
  // Bester Char nach iLvl
  var bestIlvl=allChars.reduce(function(b,c){return(parseInt(c.ilvl)||0)>(parseInt(b.ilvl)||0)?c:b},allChars[0]);
  // Bester M+ Score
  var bestScore=wowChars.length?wowChars.reduce(function(b,c){return(parseInt(c.mscore)||0)>(parseInt(b.mscore)||0)?c:b},wowChars[0]):null;
  // Meistes Gold
  var richest=allChars.reduce(function(b,c){return(parseInt(c.gold)||0)>(parseInt(b.gold)||0)?c:b},allChars[0]);
  // Gesamt Gold
  var totalGold=allChars.reduce(function(s,c){return s+(parseInt(c.gold)||0)},0);
  // Weekly Fortschritt
  var totalW=0,doneW=0;
  wowChars.forEach(function(ch){var w=S.weekly[ch.id]||{};var items=[!!w.mplus,!!(w.raidN||w.raidH||w.raidM),(w.vault||0)>=3];totalW+=items.length;doneW+=items.filter(Boolean).length});
  // Erfolge
  var achDone=ACH.filter(function(a){return(S.ach[a.id]||0)>=a.m}).length;
  var earnedPts=ACH.filter(function(a){return(S.ach[a.id]||0)>=a.m}).reduce(function(s,a){return s+(ACH_PTS[a.id]||0)},0);

  // Karte 1: Charaktere
  var c1=dv('stat-card');c1.appendChild(mk('div','stat-title','👥  Charaktere'));
  [
    ['Gesamt',allChars.length+' Chars',false],
    ['WoW Chars',wowChars.length+' Chars',false],
    ['Höchstes iLvl',bestIlvl?(bestIlvl.name+' · '+( bestIlvl.ilvl||'—')):'—',false],
    ['Bester M+ Score',bestScore&&bestScore.mscore?bestScore.name+' · '+bestScore.mscore:'—','blue'],
    ['Reichster Char',richest&&richest.gold&&richest.gold!='0'?richest.name+' · '+Number(richest.gold).toLocaleString('de-DE')+'g':'—','gold'],
    ['Gesamt Gold',totalGold>0?Number(totalGold).toLocaleString('de-DE')+'g':'—','gold'],
  ].forEach(function(r){
    var row=dv('stat-row');
    row.appendChild(mk('span','stat-name',r[0]));
    var val=mk('span','stat-val'+(r[2]?' '+r[2]:''),r[1]);
    row.appendChild(val);c1.appendChild(row);
  });
  wrap.appendChild(c1);

  // Karte 2: Weekly
  var c2=dv('stat-card');c2.appendChild(mk('div','stat-title','📅  Weekly Fortschritt'));
  [
    ['Aufgaben erledigt',doneW+'/'+totalW,'green'],
    ['Fortschritt',totalW>0?Math.round(doneW/totalW*100)+'%':'—','green'],
    ['Weeklies (Todos)',Object.keys(S.wtodos).filter(function(k){return S.wtodos[k]}).length+'/'+WTODOS.length,false],
  ].forEach(function(r){
    var row=dv('stat-row');
    row.appendChild(mk('span','stat-name',r[0]));
    var val=mk('span','stat-val'+(r[2]?' '+r[2]:''),r[1]);
    row.appendChild(val);c2.appendChild(row);
  });
  wrap.appendChild(c2);

  // Karte 3: Erfolge
  var c3=dv('stat-card');c3.appendChild(mk('div','stat-title','🏆  Erfolge'));
  [
    ['Abgeschlossen',achDone+'/'+ACH.length,false],
    ['Gesammelte Punkte',earnedPts+' Pkt.','gold'],
    ['Maximale Punkte',ACH_TOTAL_PTS+' Pkt.',false],
    ['Fortschritt',Math.round(earnedPts/ACH_TOTAL_PTS*100)+'%','green'],
  ].forEach(function(r){
    var row=dv('stat-row');
    row.appendChild(mk('span','stat-name',r[0]));
    var val=mk('span','stat-val'+(r[2]?' '+r[2]:''),r[1]);
    row.appendChild(val);c3.appendChild(row);
  });
  wrap.appendChild(c3);
  return wrap;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function navDef(){var sw=showWow();return[{k:'chars',l:'Charaktere'},sw?{k:'weekly',l:'Weekly'}:{k:'goals',l:'Ziele'},{k:'achievements',l:'Erfolge'},{k:'stats',l:'Stats'},{k:'notes',l:'Notizen'}]}
function render(){
  var app=document.getElementById('app');app.innerHTML='';
  var nv=navDef(),vp=nv.find(function(n){return n.k===S.page})?S.page:nv[0].k,sw=showWow();
  var hdr=dv('hdr');
  // Klassenfarbe des ersten WoW-Chars in Header
  var firstWow=S.chars.find(function(c){return iw(c.game)});

  var ht=mk('div','htitle','');ht.innerHTML='Gamer <em>Logbuch</em>';
  if(sw){var sb=mk('span','season-badge','S3');ht.appendChild(sb)}
  hdr.appendChild(ht);
  var sr=dv('srow');var sico=sp('','🔍');sico.style.cssText='color:#44445a;flex-shrink:0';sr.appendChild(sico);
  var si=inpEl('text',S.search,'Suchen...','');si.oninput=function(e){set({search:e.target.value})};sr.appendChild(si);
  if(S.search){var xb=sp('','×');styl(xb,{cursor:'pointer',color:'#44445a',paddingLeft:'4px',flexShrink:0});xb.onclick=function(){set({search:''})};sr.appendChild(xb)}
  hdr.appendChild(sr);
  var cEl=dv('cats');['Alle','WoW','MMO','RPG','Shooter','Andere'].forEach(function(c){var ct=mk('div','cat'+(S.cat===c?' on':''),c);ct.onclick=function(){set({cat:c})};cEl.appendChild(ct)});
  hdr.appendChild(cEl);app.appendChild(hdr);
  // Weekly Reset Bar (nur wenn WoW aktiv)
  if(sw){
    var rb=dv('reset-bar');
    var rlbl=dv('reset-label');
    var rdot=dv('reset-dot');
    rlbl.appendChild(rdot);
    rlbl.appendChild(document.createTextNode('Nächster Weekly Reset'));
    var rtime=mk('span','reset-time',getResetCountdown());
    ap(rb,rlbl,rtime);
    app.appendChild(rb);
  }
  var con=dv('content');
  if(vp==='chars')con.appendChild(pgChars());else if(vp==='weekly')con.appendChild(pgWeekly());else if(vp==='goals')con.appendChild(pgGoals());else if(vp==='achievements')con.appendChild(pgAch());else if(vp==='notes')con.appendChild(pgNotes());else if(vp==='stats')con.appendChild(pgStats());
  app.appendChild(con);
  var fw=dv('fabw');
  if(S.fab){var fm=dv('fabm');[{l:'Neuen Charakter',m:'char'},{l:sw?'Weekly starten':'Ziel hinzufügen',m:'goal'},{l:'Notiz schreiben',m:'note'},{l:'☕ Unterstützen',m:'upgrade'}].forEach(function(it){var b=bt('fabi',it.l,null);(function(m){b.onclick=function(){set({modal:m,fab:false})}})(it.m);fm.appendChild(b)});fw.appendChild(fm)}
  var fb=bt('fabb'+(S.fab?' open':''),S.fab?'×':'+',function(){set({fab:!S.fab})});fw.appendChild(fb);app.appendChild(fw);
  var ne=dv('nav');nv.forEach(function(n){var b=bt('nb'+(vp===n.k?' on':''),n.l,null);(function(k){b.onclick=function(){set({page:k,fab:false})}})(n.k);ne.appendChild(b)});app.appendChild(ne);
  if(S.modal){var ov=dv('ov');ov.onclick=function(e){if(e.target===ov)set({modal:null})};if(S.modal==='char')ov.appendChild(mChar());else if(S.modal==='goal')ov.appendChild(mGoal());else if(S.modal==='note')ov.appendChild(mNote());else if(S.modal==='editchar')ov.appendChild(mEditChar());else if(S.modal==='upgrade')ov.appendChild(modalUpgrade());else if(S.modal==='gold')ov.appendChild(modalGold(S.goldCharId));app.appendChild(ov)}
}
checkWeeklyReset();
render();
