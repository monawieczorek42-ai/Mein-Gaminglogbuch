<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#2f3136;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:#dcddde}
#app{max-width:480px;margin:0 auto;background:#36393f;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid #202225;border-right:1px solid #202225}

/* HEADER */
.hdr{background:#2f3136;padding:10px 14px 0;border-bottom:1px solid #202225;flex-shrink:0}
.htitle{text-align:center;font-size:18px;font-weight:800;letter-spacing:4px;color:#fff;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;text-transform:uppercase}
.htitle em{color:#7289da;font-style:normal}
.wow-badge{font-size:10px;background:#ff7d0a22;color:#ff7d0a;border:1px solid #ff7d0a55;border-radius:10px;padding:2px 8px;font-weight:700}
.srow{display:flex;align-items:center;background:#40444b;border-radius:6px;padding:6px 10px;margin-bottom:8px;border:1px solid #202225;gap:7px}
.srow input{background:none;border:none;outline:none;color:#dcddde;font-size:13px;flex:1;font-family:inherit}
.srow input::placeholder{color:#72767d}
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{background:#40444b;border:1px solid #4f545c;border-radius:20px;padding:3px 12px;font-size:12px;color:#b9bbbe;cursor:pointer;white-space:nowrap;user-select:none;flex-shrink:0}
.cat.on{background:#5865f2;border-color:#5865f2;color:#fff;font-weight:600}

/* CONTENT */
.content{flex:1;padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* SLIM NAV */
.nav{display:flex;background:#2f3136;border-top:1px solid #202225;flex-shrink:0;height:40px}
.nb{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:#72767d;font-size:11px;font-weight:500;font-family:inherit;border-right:1px solid #202225;white-space:nowrap;padding:0}
.nb:last-child{border-right:none}
.nb.on{color:#7289da;font-weight:700}

/* CARDS */
.card{background:#40444b;border-radius:8px;border:1px solid #202225;margin-bottom:10px;position:relative;overflow:hidden}
.card-row{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ptitle{font-size:17px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase}
.row-hdr{display:flex;align-items:center;margin-bottom:12px}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:#72767d}
.empty .eico{font-size:36px;margin-bottom:12px;opacity:.35}

/* WOW TOGGLE */
.wtog{display:flex;align-items:center;justify-content:space-between;background:#40444b;border:1px solid #4f545c;border-radius:10px;padding:10px 14px;margin-bottom:12px;cursor:pointer;user-select:none}
.wtog.on{background:linear-gradient(135deg,#5865f214,#7289da08);border-color:#5865f255;box-shadow:0 0 18px #5865f220}
.wtog-label{font-size:13px;font-weight:600;color:#b9bbbe}
.wtog.on .wtog-label{color:#a5b4fc}
.wtog-sub{font-size:11px;color:#72767d;margin-top:2px}
.wtog.on .wtog-sub{color:#7289da88}
.pill{width:40px;height:22px;border-radius:11px;background:#4f545c;position:relative;transition:.25s;flex-shrink:0}
.pill.on{background:#5865f2;box-shadow:0 0 10px #5865f266}
.pill::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.25s}
.pill.on::after{left:21px}

/* AVATAR */
.av{border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800}

/* CHECKBOX */
.cb{width:20px;height:20px;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid #4f545c;background:transparent;font-size:12px;font-weight:700;color:#1a1a1a;user-select:none;transition:.15s}
.cb.on{background:#57f287;border-color:#57f287}
@keyframes glw{0%{box-shadow:0 0 0 0 #57f28766}100%{box-shadow:0 0 14px 6px #57f28700}}
.glw{animation:glw .55s ease-out}

/* WEEKLY */
.crow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #202225}
.crow:last-child{border-bottom:none}
.sec-title{font-size:10px;color:#72767d;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin:14px 0 6px}
.vault-row{display:flex;gap:6px;margin-top:6px}
.vs{flex:1;height:22px;border-radius:4px;cursor:pointer;border:1px solid #4f545c;background:#2f3136;transition:.2s}
.vs.on{background:#ffd700;border-color:#ffd700}

/* CHAR SELECTOR */
.csel{display:inline-flex;align-items:center;gap:5px;border:1px solid #4f545c;border-radius:20px;padding:5px 12px;cursor:pointer;margin:0 6px 6px 0;user-select:none}
.csel.on{background:#5865f2;border-color:#5865f2}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;margin-right:4px;margin-top:4px}

/* ACHIEVEMENTS */
.pb{height:5px;background:#2f3136;border-radius:3px;overflow:hidden;margin:5px 0 2px}
.pbf{height:100%;border-radius:3px;transition:.5s}

/* FORMS */
.fi{width:100%;background:#2f3136;border:1px solid #4f545c;border-radius:6px;padding:8px 10px;color:#dcddde;font-size:14px;outline:none;font-family:inherit}
.fi:focus{border-color:#5865f2}
.fg{margin-bottom:12px}
.fl{font-size:10px;color:#72767d;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:block}
.bp{width:100%;background:#5865f2;border:none;border-radius:8px;padding:11px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit}
.bs{width:100%;background:#4f545c;border:none;border-radius:8px;padding:11px;color:#b9bbbe;font-size:14px;cursor:pointer;margin-top:6px;font-family:inherit}

/* CLASS COLOR PICKER */
.cls-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.cls-opt{border-radius:6px;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid transparent;transition:.15s;user-select:none}
.cls-opt.on{border-color:#fff4;background:#ffffff11}
.cls-abbr{font-size:12px;font-weight:800;letter-spacing:.5px}
.cls-name{font-size:9px;color:#b9bbbe;text-align:center;line-height:1.2}

/* FAB */
.fab-wrap{padding:10px 14px 14px;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.fab-btn{width:50px;height:50px;border-radius:50%;background:#5865f2;border:none;cursor:pointer;color:#fff;font-size:28px;box-shadow:0 4px 18px #5865f255;align-self:flex-end;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.fab-btn.open{transform:rotate(45deg);background:#ed4245}
.fab-menu{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab-item{background:#40444b;border:1px solid #4f545c;border-radius:20px;padding:8px 16px;cursor:pointer;color:#dcddde;font-size:13px;font-weight:500;box-shadow:0 2px 14px #00000055;white-space:nowrap;font-family:inherit}

/* MODAL */
.ov{position:fixed;inset:0;background:#000000bb;z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#40444b;border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;border-top:2px solid #5865f255;max-height:92vh;overflow-y:auto}
.mtitle{font-size:17px;font-weight:800;color:#fff;text-align:center;margin-bottom:16px;letter-spacing:.5px;text-transform:uppercase}

/* MISC */
.delbtn{background:none;border:none;cursor:pointer;color:#72767d;padding:4px 6px;font-size:15px;flex-shrink:0}
.ni{background:none;border:none;outline:none;font-size:14px;font-weight:700;color:#fff;flex:1;min-width:0;font-family:inherit}
.info-hint{font-size:11px;color:#72767d;margin-top:4px;padding:4px 0}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── WOW CLASSES with official colors ─────────────────────────────────────────
var WC=[
  {k:"dk",      n:"Todesritter",    a:"TK", c:"#C41E3A"},
  {k:"dh",      n:"Dämonenjäger",   a:"DJ", c:"#A330C9"},
  {k:"druid",   n:"Druide",         a:"DR", c:"#FF7C0A"},
  {k:"evoker",  n:"Rufer",          a:"RU", c:"#33937F"},
  {k:"hunter",  n:"Jäger",          a:"JÄ", c:"#AAD372"},
  {k:"mage",    n:"Magier",         a:"MA", c:"#3FC7EB"},
  {k:"monk",    n:"Mönch",          a:"MÖ", c:"#00FF98"},
  {k:"paladin", n:"Paladin",        a:"PA", c:"#F48CBA"},
  {k:"priest",  n:"Priester",       a:"PR", c:"#FFFFFF"},
  {k:"rogue",   n:"Schurke",        a:"SC", c:"#FFF468"},
  {k:"shaman",  n:"Schamane",       a:"SH", c:"#0070DD"},
  {k:"warlock", n:"Hexenmeister",   a:"HX", c:"#8788EE"},
  {k:"warrior", n:"Krieger",        a:"KR", c:"#C69B6D"}
];

// ── GAMES ─────────────────────────────────────────────────────────────────────
var GS=[
  {k:"wow",     l:"World of Warcraft", s:"WoW",     c:"#ff7d0a", e:"⚔️",  w:true},
  {k:"classic", l:"WoW Classic",       s:"Classic", c:"#ffd700", e:"📜",  w:true},
  {k:"hardcore",l:"WoW Hardcore",      s:"HC",      c:"#ed4245", e:"💀",  w:true},
  {k:"elden",   l:"Elden Ring",        s:"ER",      c:"#c9a84c", e:"🪦",  w:false},
  {k:"ds",      l:"Dark Souls",        s:"DS",      c:"#888888", e:"🔥",  w:false},
  {k:"cod",     l:"Call of Duty",      s:"CoD",     c:"#5b8dd9", e:"🎯",  w:false},
  {k:"ff14",    l:"Final Fantasy XIV", s:"FF14",    c:"#9b59b6", e:"🌙",  w:false},
  {k:"destiny", l:"Destiny 2",         s:"D2",      c:"#e67e22", e:"🌌",  w:false},
  {k:"other",   l:"Anderes Spiel",     s:"?",       c:"#72767d", e:"🎮",  w:false}
];

// ── ACHIEVEMENTS ──────────────────────────────────────────────────────────────
var ACH=[
  {id:"a1",e:"⚔️",n:"Erster M+10 Key",   d:"Schließe einen +10 ab",           m:1},
  {id:"a2",e:"🐉",n:"Raid Boss besiegt",  d:"Ersten Raidboss besiegen",        m:1},
  {id:"a3",e:"📦",n:"Große Kammer 3/3",   d:"Alle 3 Vault-Slots öffnen",       m:3},
  {id:"a4",e:"🏆",n:"Heroisch Clearing",  d:"Einen heroischen Raid räumen",    m:1},
  {id:"a5",e:"⚡",n:"M+ Rating 2000",     d:"Rating 2000+ in M+ erreichen",    m:1},
  {id:"a6",e:"🎯",n:"M+15 Meister",       d:"Einen +15 abschließen",           m:1},
  {id:"a7",e:"💎",n:"Mythisch Raider",    d:"Einen mythischen Boss besiegen",  m:1},
  {id:"a8",e:"📖",n:"Stratege",           d:"10 Notizen schreiben",            m:10},
  {id:"a9",e:"👥",n:"Twink Sammler",      d:"5 Charaktere erstellen",          m:5},
  {id:"a10",e:"🌟",n:"Weekly Veteran",   d:"20 Weekly-Aufgaben erledigen",    m:20}
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function isWow(k){return(GS.find(function(g){return g.k===k})||{}).w||false}
function gi(k){return GS.find(function(g){return g.k===k})||GS[GS.length-1]}
function ci(k){return WC.find(function(c){return c.k===k})||WC[0]}

// ── LOCALSTORAGE ──────────────────────────────────────────────────────────────
var LS_KEY='gamer_logbuch_v1';
function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null}
}
function saveState(){
  try{
    var toSave={
      page:S.page,cat:S.cat,chars:S.chars,weekly:S.weekly,
      goals:S.goals,notes:S.notes,ach:S.ach,sel:S.sel,wow:S.wow
    };
    localStorage.setItem(LS_KEY,JSON.stringify(toSave));
  }catch(e){}
}

// ── STATE ─────────────────────────────────────────────────────────────────────
var saved=loadState()||{};
var S={
  page:   saved.page   ||'chars',
  cat:    saved.cat    ||'Alle',
  chars:  saved.chars  ||[],
  weekly: saved.weekly ||{},
  goals:  saved.goals  ||[],
  notes:  saved.notes  ||[],
  ach:    saved.ach    ||{},
  sel:    saved.sel    ||null,
  wow:    saved.wow    ||false,
  search: '',
  modal:  null,
  fab:    false
};
// Auto-enable WoW mode if WoW chars exist
if(S.chars.some(function(c){return isWow(c.game)}))S.wow=true;

function setState(patch){
  Object.keys(patch).forEach(function(k){S[k]=patch[k]});
  saveState();
  render();
}

// ── DOM BUILDER ───────────────────────────────────────────────────────────────
function mk(tag,a,ch){
  var e=document.createElement(tag);
  if(a)Object.keys(a).forEach(function(k){
    var v=a[k];
    if(k==='cls')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='text')e.textContent=v;
    else if(k==='html')e.innerHTML=v;
    else if(k.slice(0,2)==='on')e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  if(ch)(Array.isArray(ch)?ch:[ch]).forEach(function(c){
    if(c==null)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function dv(a,ch){return mk('div',a,ch)}
function Btn(cls,txt,fn){var b=mk('button',{cls:cls,text:txt});b.addEventListener('click',fn);return b}
function Inp(a){return mk('input',a)}
function Sel(a,opts,val){
  var s=mk('select',a);
  opts.forEach(function(o){
    var op=mk('option',{value:o.v||o,text:o.l||o});
    if((o.v||o)===val)op.selected=true;
    s.appendChild(op);
  });
  return s;
}
function Txa(cls,val,ph){var t=mk('textarea',{cls:cls,placeholder:ph});t.value=val||'';return t}

function showWow(){return S.wow||S.chars.some(function(c){return isWow(c.game)})}

// ── AVATAR ────────────────────────────────────────────────────────────────────
function avatar(ch,sz){
  sz=sz||36;
  var av=dv({cls:'av',style:{width:sz+'px',height:sz+'px',fontSize:sz>30?'14px':'11px'}});
  if(isWow(ch.game)){
    var c=ci(ch.cls);
    Object.assign(av.style,{background:c.c+'22',border:'1px solid '+c.c+'55',color:c.c,boxShadow:'0 0 8px '+c.c+'22'});
    av.textContent=c.a;
  }else{
    var g=gi(ch.game);
    Object.assign(av.style,{background:g.c+'22',border:'1px solid '+g.c+'44',fontSize:sz>30?'18px':'14px'});
    av.textContent=g.e;
  }
  return av;
}

// ── CHECKBOX ──────────────────────────────────────────────────────────────────
function checkbox(checked,fn){
  var e=dv({cls:'cb'+(checked?' on':''),text:checked?'✓':''});
  e.addEventListener('click',function(){
    e.classList.add('glw');
    setTimeout(function(){e.classList.remove('glw')},600);
    fn();
  });
  return e;
}

// ── WOW STATUS CHIPS ──────────────────────────────────────────────────────────
function wchips(w){
  var mp=w.mplus,rd=w.raidM||w.raidH||w.raidN,rl=w.raidM?'M':w.raidH?'H':'N',vf=(w.vault||0)>=3;
  var row=dv({style:{display:'flex',flexWrap:'wrap'}});
  function chip(txt,bg,col,border){
    var c=mk('span',{cls:'chip',text:txt});
    c.style.cssText='background:'+bg+';color:'+col+';border:1px solid '+border;
    return c;
  }
  row.appendChild(chip(mp?'⚡ M+✓'+(w.mplusLevel?' +'+w.mplusLevel:''):'⚡ M+ —',mp?'#5865f222':'#4f545c44',mp?'#7289da':'#72767d',mp?'#5865f244':'#4f545c44'));
  row.appendChild(chip(rd?'🛡 Raid '+rl+' ✓':'🛡 Raid —',rd?'#57f28714':'#4f545c44',rd?'#57f287':'#72767d',rd?'#57f28733':'#4f545c44'));
  row.appendChild(chip('📦 '+(w.vault||0)+'/3',vf?'#ffd70014':'#4f545c44',vf?'#ffd700':'#72767d',vf?'#ffd70033':'#4f545c44'));
  return row;
}

// ── CLASS COLOR PICKER ────────────────────────────────────────────────────────
function classPicker(selected,onChange){
  var grid=dv({cls:'cls-grid'});
  WC.forEach(function(cls){
    var opt=dv({cls:'cls-opt'+(selected===cls.k?' on':''),style:{background:cls.c+'18',borderColor:selected===cls.k?cls.c+'99':'transparent'}});
    opt.appendChild(mk('span',{cls:'cls-abbr',text:cls.a,style:{color:cls.c}}));
    opt.appendChild(mk('span',{cls:'cls-name',text:cls.n}));
    opt.addEventListener('click',function(){onChange(cls.k)});
    grid.appendChild(opt);
  });
  return grid;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PAGES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function pageChars(){
  var sw=showWow();

  // WoW Toggle
  var tog=dv({cls:'wtog'+(sw?' on':'')});
  var left=dv({style:{display:'flex',alignItems:'center',gap:'10px'}});
  var ico=mk('span',{text:'⚔️',style:{fontSize:'18px',filter:sw?'drop-shadow(0 0 6px #5865f2)':'none'}});
  var txt=dv({});
  txt.appendChild(mk('div',{cls:'wtog-label',text:'WoW Pro-Modus'}));
  txt.appendChild(mk('div',{cls:'wtog-sub',text:sw?'Weekly · M+ · Raid · Vault aktiv':'Aktivieren für WoW-spezifische Features'}));
  left.appendChild(ico);left.appendChild(txt);
  tog.appendChild(left);
  tog.appendChild(dv({cls:'pill'+(sw?' on':'')}));
  tog.addEventListener('click',function(){setState({wow:!S.wow})});

  // Filter
  var f=S.chars.slice();
  if(S.search)f=f.filter(function(c){return c.name.toLowerCase().indexOf(S.search.toLowerCase())>=0});
  if(S.cat==='WoW')f=f.filter(function(c){return isWow(c.game)});
  else if(S.cat==='MMO')f=f.filter(function(c){return['wow','classic','hardcore','ff14'].indexOf(c.game)>=0});
  else if(S.cat==='RPG')f=f.filter(function(c){return['elden','ds','ff14'].indexOf(c.game)>=0});
  else if(S.cat==='Shooter')f=f.filter(function(c){return['cod','destiny'].indexOf(c.game)>=0});
  else if(S.cat==='Andere')f=f.filter(function(c){return!isWow(c.game)});

  var hdr=dv({cls:'row-hdr'});
  hdr.appendChild(mk('span',{cls:'ptitle',text:'🎮 Charaktere'}));
  hdr.appendChild(mk('span',{style:{marginLeft:'auto',fontSize:'11px',color:'#72767d'},text:S.chars.length+' Chars'}));

  var wrap=dv({});
  wrap.appendChild(tog);
  wrap.appendChild(hdr);

  if(f.length===0){
    var em=dv({cls:'empty'});
    em.appendChild(dv({cls:'eico',text:'👤'}));
    em.appendChild(mk('p',{text:'Noch keine Charaktere. Tippe auf + um einen anzulegen.'}));
    wrap.appendChild(em);
  }else{
    f.forEach(function(ch){
      var ww=isWow(ch.game),c=ci(ch.cls),g=gi(ch.game),w=S.weekly[ch.id]||{};
      var card=dv({cls:'card'});
      if(ww){
        card.style.cssText='background:linear-gradient(135deg,'+c.c+'0a,#40444b 40%);border:1px solid '+c.c+'33;box-shadow:0 0 12px '+c.c+'11';
        card.appendChild(dv({style:{position:'absolute',left:0,top:0,bottom:0,width:'3px',borderRadius:'8px 0 0 8px',background:c.c,boxShadow:'0 0 8px '+c.c+'88'}}));
      }
      var row=dv({cls:'card-row',style:{paddingLeft:ww?'18px':'14px'}});
      row.appendChild(avatar(ch,36));
      var info=dv({style:{flex:1,minWidth:0}});
      var nameLine=dv({style:{fontWeight:700,fontSize:'14px',color:ww?c.c:'#fff',display:'flex',alignItems:'center',gap:'6px',textShadow:ww?'0 0 10px '+c.c+'55':'none'}});
      nameLine.appendChild(document.createTextNode(ch.name));
      if(ww){var badge=mk('span',{text:g.s,style:{fontSize:'9px',background:g.c+'22',color:g.c,border:'1px solid '+g.c+'44',borderRadius:'4px',padding:'1px 5px',fontWeight:700}});nameLine.appendChild(badge)}
      info.appendChild(nameLine);
      if(ww){
        info.appendChild(mk('div',{text:c.n+' · '+g.s+' · iLvl '+(ch.ilvl||'—'),style:{fontSize:'11px',color:'#72767d',marginBottom:'2px'}}));
        info.appendChild(wchips(w));
      }else{
        info.appendChild(mk('div',{text:g.l+(ch.role?' · '+ch.role:''),style:{fontSize:'11px',color:'#72767d'}}));
      }
      row.appendChild(info);
      if(ww)row.appendChild(mk('div',{text:ch.ilvl||'—',style:{fontWeight:700,fontSize:'16px',color:'#ffd700',marginRight:'6px'}}));
      var del=mk('button',{cls:'delbtn',text:'🗑'});
      (function(cid){del.addEventListener('click',function(e){e.stopPropagation();setState({chars:S.chars.filter(function(x){return x.id!==cid})})})})(ch.id);
      row.appendChild(del);
      (function(cid){row.addEventListener('click',function(){setState({sel:cid,page:sw?'weekly':'goals'})})})(ch.id);
      card.appendChild(row);
      wrap.appendChild(card);
    });
  }
  return wrap;
}

function pageWeekly(){
  var wc=S.chars.filter(function(c){return isWow(c.game)});
  if(!wc.length){
    var em=dv({cls:'empty'});em.appendChild(dv({cls:'eico',text:'📅'}));
    em.appendChild(mk('p',{text:'Erstelle zuerst einen WoW-Charakter.'}));return em;
  }
  var sid=S.sel&&wc.find(function(c){return c.id===S.sel})?S.sel:wc[0].id;
  var sc=wc.find(function(c){return c.id===sid})||wc[0];
  var c=ci(sc.cls),g=gi(sc.game),w=S.weekly[sid]||{};
  function upd(k,v){var nw=JSON.parse(JSON.stringify(S.weekly));if(!nw[sid])nw[sid]={};nw[sid][k]=v;setState({weekly:nw})}

  var wrap=dv({});
  var hdr=dv({cls:'row-hdr'});hdr.appendChild(mk('span',{cls:'ptitle',text:'📅 Weekly'}));wrap.appendChild(hdr);

  var selRow=dv({style:{display:'flex',flexWrap:'wrap',marginBottom:'10px'}});
  wc.forEach(function(ch){
    var c2=ci(ch.cls),active=ch.id===sid;
    var pill=dv({cls:'csel'+(active?' on':''),style:active?{}:{borderColor:c2.c+'44'}});
    pill.appendChild(mk('span',{text:c2.a,style:{fontWeight:800,fontSize:'12px',color:active?'#fff':c2.c}}));
    pill.appendChild(mk('span',{text:ch.name,style:{fontSize:'12px',color:active?'#fff':'#b9bbbe'}}));
    (function(cid){pill.addEventListener('click',function(){setState({sel:cid})})})(ch.id);
    selRow.appendChild(pill);
  });
  wrap.appendChild(selRow);

  var card=dv({cls:'card',style:{background:'linear-gradient(135deg,'+c.c+'0a,#40444b 40%)',border:'1px solid '+c.c+'33'}});
  card.appendChild(dv({style:{position:'absolute',left:0,top:0,bottom:0,width:'3px',borderRadius:'8px 0 0 8px',background:c.c,boxShadow:'0 0 8px '+c.c+'88'}}));
  var cardH=dv({style:{padding:'11px 14px 11px 18px',display:'flex',alignItems:'center',gap:'10px',borderBottom:'1px solid #202225'}});
  cardH.appendChild(avatar(sc,34));
  var inf=dv({});
  inf.appendChild(mk('div',{text:sc.name,style:{fontWeight:700,color:c.c,textShadow:'0 0 10px '+c.c+'55'}}));
  inf.appendChild(mk('div',{text:c.n+' · '+g.s+' · iLvl '+(sc.ilvl||'—'),style:{fontSize:'11px',color:'#72767d'}}));
  cardH.appendChild(inf);card.appendChild(cardH);

  var body=dv({style:{padding:'0 14px 14px'}});
  body.appendChild(mk('div',{cls:'sec-title',text:'⚔️ Mythisch Plus'}));
  var mr=dv({cls:'crow'});
  mr.appendChild(checkbox(!!w.mplus,function(){upd('mplus',!w.mplus)}));
  mr.appendChild(mk('span',{text:'M+ Key abgeschlossen',style:{flex:1,fontSize:'13px',color:w.mplus?'#72767d':'#dcddde',textDecoration:w.mplus?'line-through':'none'}}));
  var mpIn=Inp({type:'text',value:w.mplusLevel||'',placeholder:'+?',style:{background:'#2f3136',border:'1px solid #202225',borderRadius:'4px',padding:'2px 6px',color:'#dcddde',fontSize:'12px',width:'44px',outline:'none'}});
  mpIn.addEventListener('input',function(e){upd('mplusLevel',e.target.value)});
  mr.appendChild(mpIn);body.appendChild(mr);

  body.appendChild(mk('div',{cls:'sec-title',text:'🛡️ Raid-ID'}));
  [{k:'raidN',l:'Normal',c:'#57f287',t:'EASY'},{k:'raidH',l:'Heroisch',c:'#faa61a',t:'MID'},{k:'raidM',l:'Mythisch',c:'#ed4245',t:'HARD'}].forEach(function(r){
    var row=dv({cls:'crow'});
    (function(rk){row.appendChild(checkbox(!!w[rk],function(){upd(rk,!w[rk])}))})(r.k);
    row.appendChild(mk('span',{text:r.l,style:{flex:1,fontSize:'13px',color:w[r.k]?'#72767d':'#dcddde',textDecoration:w[r.k]?'line-through':'none'}}));
    row.appendChild(mk('span',{text:r.t,style:{fontSize:'10px',background:r.c+'22',color:r.c,padding:'2px 7px',borderRadius:'4px',fontWeight:600}}));
    body.appendChild(row);
  });

  body.appendChild(mk('div',{cls:'sec-title',text:'📦 Große Kammer'}));
  var vr=dv({cls:'vault-row'});
  [1,2,3].forEach(function(i){
    var s=dv({cls:'vs'+(i<=(w.vault||0)?' on':'')});
    (function(idx){s.addEventListener('click',function(){upd('vault',(w.vault||0)===idx?idx-1:idx)})})(i);
    vr.appendChild(s);
  });
  body.appendChild(vr);
  body.appendChild(mk('div',{text:(w.vault||0)+'/3 '+((w.vault||0)===3?'✨ Vault voll!':'Slots gefüllt'),style:{fontSize:'11px',color:'#72767d',marginTop:'4px'}}));
  card.appendChild(body);wrap.appendChild(card);
  return wrap;
}

function pageGoals(){
  var f=S.goals.slice();
  if(S.search)f=f.filter(function(g){return g.title.toLowerCase().indexOf(S.search.toLowerCase())>=0});
  var pC={Hoch:'#ed4245',Mittel:'#faa61a',Niedrig:'#57f287'};
  var wrap=dv({});
  var hdr=dv({cls:'row-hdr'});
  hdr.appendChild(mk('span',{cls:'ptitle',text:'🎯 Ziele & Quests'}));
  hdr.appendChild(mk('span',{text:S.goals.filter(function(g){return g.done}).length+'/'+S.goals.length,style:{marginLeft:'auto',fontSize:'11px',color:'#72767d'}}));
  wrap.appendChild(hdr);
  if(f.length===0){
    var em=dv({cls:'empty'});em.appendChild(dv({cls:'eico',text:'🎯'}));
    em.appendChild(mk('p',{text:'Keine Ziele. Tippe auf + um ein Ziel anzulegen.'}));wrap.appendChild(em);
  }else{
    f.forEach(function(g){
      var g2=gi(g.game);
      var card=dv({cls:'card',style:{border:'1px solid '+(g.done?'#57f28744':'#202225')}});
      var row=dv({style:{padding:'10px 14px',display:'flex',alignItems:'center',gap:'8px'}});
      (function(gid){row.appendChild(checkbox(!!g.done,function(){setState({goals:S.goals.map(function(x){return x.id===gid?Object.assign({},x,{done:!x.done}):x})})}))})(g.id);
      var inf=dv({style:{flex:1,minWidth:0}});
      inf.appendChild(mk('div',{text:g.title,style:{fontWeight:600,fontSize:'13px',color:g.done?'#72767d':'#fff',textDecoration:g.done?'line-through':'none'}}));
      var tags=dv({style:{display:'flex',flexWrap:'wrap',marginTop:'3px'}});
      var t1=mk('span',{text:g2.e+' '+g2.s,cls:'chip'});t1.style.cssText='background:'+g2.c+'22;color:'+g2.c+';border:1px solid '+g2.c+'33';tags.appendChild(t1);
      if(g.prio){var t2=mk('span',{text:g.prio,cls:'chip'});t2.style.cssText='background:'+(pC[g.prio]||'#888')+'22;color:'+(pC[g.prio]||'#888')+';border:1px solid '+(pC[g.prio]||'#888')+'33';tags.appendChild(t2)}
      inf.appendChild(tags);row.appendChild(inf);
      (function(gid){var del=mk('button',{cls:'delbtn',text:'🗑'});del.addEventListener('click',function(){setState({goals:S.goals.filter(function(x){return x.id!==gid})})});row.appendChild(del)})(g.id);
      card.appendChild(row);wrap.appendChild(card);
    });
  }
  return wrap;
}

function pageAch(){
  var done=ACH.filter(function(a){return(S.ach[a.id]||0)>=a.m}).length;
  var wrap=dv({});
  var hdr=dv({cls:'row-hdr'});
  hdr.appendChild(mk('span',{cls:'ptitle',text:'🏆 Erfolge'}));
  hdr.appendChild(mk('span',{text:done+'/'+ACH.length,style:{marginLeft:'auto',fontSize:'11px',color:'#72767d'}}));
  wrap.appendChild(hdr);
  ACH.forEach(function(a){
    var p=S.ach[a.id]||0,pct=Math.min(100,Math.round(p/a.m*100)),ok=pct>=100;
    var card=dv({cls:'card',style:{border:'1px solid '+(ok?'#57f28744':'#202225')}});
    var row=dv({style:{padding:'12px 14px',display:'flex',gap:'12px',alignItems:'center'}});
    var ico=dv({text:a.e,style:{width:'42px',height:'42px',borderRadius:'8px',flexShrink:0,background:ok?'#57f28722':'#4f545c',border:'1px solid '+(ok?'#57f28755':'#202225'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',boxShadow:ok?'0 0 12px #57f28733':'none'}});
    row.appendChild(ico);
    var inf=dv({style:{flex:1,minWidth:0}});
    inf.appendChild(mk('div',{text:a.n,style:{fontWeight:600,fontSize:'13px',color:'#fff',marginBottom:'2px'}}));
    inf.appendChild(mk('div',{text:a.d,style:{fontSize:'11px',color:'#72767d'}}));
    var pb=dv({cls:'pb'});pb.appendChild(dv({cls:'pbf',style:{width:pct+'%',background:ok?'#57f287':'linear-gradient(90deg,#5865f2,#57f287)'}}));inf.appendChild(pb);
    inf.appendChild(mk('div',{text:p+'/'+a.m+' '+(ok?'✓ Abgeschlossen':pct+'%'),style:{fontSize:'10px',color:ok?'#57f287':'#72767d',fontWeight:600}}));
    row.appendChild(inf);
    if(ok){row.appendChild(mk('div',{text:'✓',style:{color:'#57f287',fontSize:'20px'}}))}
    else{
      var btns=dv({style:{display:'flex',flexDirection:'column',gap:'4px'}});
      (function(aid,am){
        var bp=mk('button',{text:'+',style:{background:'#4f545c',border:'none',borderRadius:'4px',color:'#57f287',cursor:'pointer',padding:'4px 10px',fontSize:'15px'}});
        bp.addEventListener('click',function(){var na=Object.assign({},S.ach);na[aid]=Math.min(am,(S.ach[aid]||0)+1);setState({ach:na})});
        var bm=mk('button',{text:'−',style:{background:'#4f545c',border:'none',borderRadius:'4px',color:'#ed4245',cursor:'pointer',padding:'4px 10px',fontSize:'15px'}});
        bm.addEventListener('click',function(){var na=Object.assign({},S.ach);na[aid]=Math.max(0,(S.ach[aid]||0)-1);setState({ach:na})});
        btns.appendChild(bp);btns.appendChild(bm);
      })(a.id,a.m);
      row.appendChild(btns);
    }
    card.appendChild(row);wrap.appendChild(card);
  });
  return wrap;
}

function pageNotes(){
  var f=S.notes.slice();
  if(S.search)f=f.filter(function(n){return n.title.toLowerCase().indexOf(S.search.toLowerCase())>=0||(n.body||'').toLowerCase().indexOf(S.search.toLowerCase())>=0});
  var wrap=dv({});
  var hdr=dv({cls:'row-hdr'});
  hdr.appendChild(mk('span',{cls:'ptitle',text:'📝 Notizen'}));
  hdr.appendChild(mk('span',{text:S.notes.length+' Notizen',style:{marginLeft:'auto',fontSize:'11px',color:'#72767d'}}));
  wrap.appendChild(hdr);
  if(f.length===0){
    var em=dv({cls:'empty'});em.appendChild(dv({cls:'eico',text:'📄'}));
    em.appendChild(mk('p',{text:'Keine Notizen. Tippe auf + um eine Notiz zu erstellen.'}));wrap.appendChild(em);
  }else{
    f.forEach(function(n){
      var card=dv({cls:'card',style:{padding:'12px 14px'}});
      var top=dv({style:{display:'flex',alignItems:'center',marginBottom:'8px'}});
      var ni=Inp({type:'text',value:n.title,placeholder:'Titel...',cls:'ni'});
      (function(nid){ni.addEventListener('input',function(e){setState({notes:S.notes.map(function(x){return x.id===nid?Object.assign({},x,{title:e.target.value}):x})})})})(n.id);
      top.appendChild(ni);
      top.appendChild(mk('span',{text:n.tag||'Notiz',style:{fontSize:'10px',background:'#5865f222',color:'#7289da',padding:'2px 8px',borderRadius:'10px',fontWeight:600,marginRight:'6px',flexShrink:0}}));
      (function(nid){var del=mk('button',{cls:'delbtn',text:'🗑'});del.addEventListener('click',function(){setState({notes:S.notes.filter(function(x){return x.id!==nid})})});top.appendChild(del)})(n.id);
      var ta=Txa('fi',n.body,'Taktik, Loot-Liste, Hinweise...');
      ta.style.cssText='resize:vertical;line-height:1.5;min-height:65px';
      (function(nid){ta.addEventListener('input',function(e){setState({notes:S.notes.map(function(x){return x.id===nid?Object.assign({},x,{body:e.target.value}):x})})})})(n.id);
      card.appendChild(top);card.appendChild(ta);wrap.appendChild(card);
    });
  }
  return wrap;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODALS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function modalChar(){
  var f={name:'',game:'wow',cls:'warrior',ilvl:'',role:''};
  var wrap=dv({cls:'modal'});
  wrap.appendChild(mk('div',{cls:'mtitle',text:'Charakter hinzufügen'}));
  function rebuild(){
    while(wrap.children.length>1)wrap.removeChild(wrap.lastChild);
    var ww=isWow(f.game),c=ci(f.cls),g=gi(f.game);
    // Game
    var fg1=dv({cls:'fg'});fg1.appendChild(mk('label',{cls:'fl',text:'Spiel'}));
    var gs=Sel({cls:'fi'},GS.map(function(g2){return{v:g2.k,l:g2.e+' '+g2.l}}),f.game);
    gs.addEventListener('change',function(e){f.game=e.target.value;rebuild()});
    fg1.appendChild(gs);wrap.appendChild(fg1);
    // Name
    var fg2=dv({cls:'fg'});fg2.appendChild(mk('label',{cls:'fl',text:'Name'}));
    var ni=Inp({type:'text',placeholder:ww?'z.B. Arthas':'z.B. Tarnished',value:f.name,cls:'fi'});
    ni.addEventListener('input',function(e){f.name=e.target.value});
    fg2.appendChild(ni);wrap.appendChild(fg2);
    if(ww){
      // Class color picker
      var fg3=dv({cls:'fg'});fg3.appendChild(mk('label',{cls:'fl',text:'Klasse wählen'}));
      var pickerContainer=dv({});
      function renderPicker(){
        pickerContainer.innerHTML='';
        pickerContainer.appendChild(classPicker(f.cls,function(k){f.cls=k;renderPicker()}));
        // Selected class hint
        var selC=ci(f.cls);
        var hint=mk('div',{cls:'info-hint',text:'● '+selC.n+' ausgewählt',style:{color:selC.c,fontWeight:700,fontSize:'12px'}});
        pickerContainer.appendChild(hint);
      }
      renderPicker();
      fg3.appendChild(pickerContainer);wrap.appendChild(fg3);
      // Itemlevel
      var fg4=dv({cls:'fg'});fg4.appendChild(mk('label',{cls:'fl',text:'Itemlevel'}));
      var ii=Inp({type:'number',placeholder:'z.B. 650',value:f.ilvl,cls:'fi'});
      ii.addEventListener('input',function(e){f.ilvl=e.target.value});
      fg4.appendChild(ii);wrap.appendChild(fg4);
    }else{
      var fg5=dv({cls:'fg'});fg5.appendChild(mk('label',{cls:'fl',text:'Klasse / Rolle'}));
      var ri=Inp({type:'text',placeholder:'z.B. Krieger, Tank, Heiler',value:f.role,cls:'fi'});
      ri.addEventListener('input',function(e){f.role=e.target.value});
      fg5.appendChild(ri);wrap.appendChild(fg5);
    }
    wrap.appendChild(mk('div',{text:g.e+' '+g.l+(ww?' · WoW Pro-Features aktiv':''),style:{padding:'8px 12px',background:g.c+'11',border:'1px solid '+g.c+'33',borderRadius:'6px',marginBottom:'12px',fontSize:'12px',color:g.c}}));
    wrap.appendChild(Btn('bp','✓ Charakter speichern',function(){
      if(!f.name.trim())return;
      setState({chars:S.chars.concat([Object.assign({},f,{id:'c'+Date.now()})]),modal:null,page:'chars'});
    }));
    wrap.appendChild(Btn('bs','Abbrechen',function(){setState({modal:null})}));
  }
  rebuild();return wrap;
}

function modalGoal(){
  var f={title:'',game:'wow',prio:'Mittel',notes:''};
  var sw=showWow();
  var wrap=dv({cls:'modal'});
  wrap.appendChild(mk('div',{cls:'mtitle',text:sw?'Weekly starten':'Ziel hinzufügen'}));
  var fg1=dv({cls:'fg'});fg1.appendChild(mk('label',{cls:'fl',text:'Spiel'}));
  var gs=Sel({cls:'fi'},GS.map(function(g){return{v:g.k,l:g.e+' '+g.l}}),f.game);gs.addEventListener('change',function(e){f.game=e.target.value});fg1.appendChild(gs);wrap.appendChild(fg1);
  var fg2=dv({cls:'fg'});fg2.appendChild(mk('label',{cls:'fl',text:'Ziel / Quest'}));
  var ti=Inp({type:'text',placeholder:'z.B. M+15 abschließen',cls:'fi'});ti.addEventListener('input',function(e){f.title=e.target.value});fg2.appendChild(ti);wrap.appendChild(fg2);
  var fg3=dv({cls:'fg'});fg3.appendChild(mk('label',{cls:'fl',text:'Priorität'}));
  var ps=Sel({cls:'fi'},['Hoch','Mittel','Niedrig'],'Mittel');ps.addEventListener('change',function(e){f.prio=e.target.value});fg3.appendChild(ps);wrap.appendChild(fg3);
  var fg4=dv({cls:'fg'});fg4.appendChild(mk('label',{cls:'fl',text:'Notiz (optional)'}));
  var ni=Inp({type:'text',placeholder:'Kurze Notiz...',cls:'fi'});ni.addEventListener('input',function(e){f.notes=e.target.value});fg4.appendChild(ni);wrap.appendChild(fg4);
  wrap.appendChild(Btn('bp','✓ Ziel speichern',function(){if(!f.title.trim())return;setState({goals:[Object.assign({},f,{id:'g'+Date.now(),done:false})].concat(S.goals),modal:null,page:sw?'weekly':'goals'})}));
  wrap.appendChild(Btn('bs','Abbrechen',function(){setState({modal:null})}));
  return wrap;
}

function modalNote(){
  var f={title:'',body:'',tag:'Notiz'};
  var wrap=dv({cls:'modal'});
  wrap.appendChild(mk('div',{cls:'mtitle',text:'Neue Notiz'}));
  var fg1=dv({cls:'fg'});fg1.appendChild(mk('label',{cls:'fl',text:'Titel'}));
  var ti=Inp({type:'text',placeholder:'z.B. Fyrakk Taktik',cls:'fi'});ti.addEventListener('input',function(e){f.title=e.target.value});fg1.appendChild(ti);wrap.appendChild(fg1);
  var fg2=dv({cls:'fg'});fg2.appendChild(mk('label',{cls:'fl',text:'Kategorie'}));
  var ts=Sel({cls:'fi'},['Notiz','WoW','Raid','M+','PvP','Loot','Strategie','Build','Andere'],'Notiz');ts.addEventListener('change',function(e){f.tag=e.target.value});fg2.appendChild(ts);wrap.appendChild(fg2);
  var fg3=dv({cls:'fg'});fg3.appendChild(mk('label',{cls:'fl',text:'Notiz'}));
  var ta=Txa('fi','','Taktik, Loot, Build, Hinweise...');ta.style.cssText='resize:vertical;min-height:80px';ta.addEventListener('input',function(e){f.body=e.target.value});fg3.appendChild(ta);wrap.appendChild(fg3);
  wrap.appendChild(Btn('bp','✓ Notiz speichern',function(){if(!f.title.trim())return;setState({notes:[Object.assign({},f,{id:'n'+Date.now()})].concat(S.notes),modal:null,page:'notes'})}));
  wrap.appendChild(Btn('bs','Abbrechen',function(){setState({modal:null})}));
  return wrap;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getNav(){
  var sw=showWow();
  return[
    {k:'chars',l:'Charaktere'},
    sw?{k:'weekly',l:'Weekly'}:{k:'goals',l:'Ziele'},
    {k:'achievements',l:'Erfolge'},
    {k:'notes',l:'Notizen'}
  ];
}

function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var nav=getNav();
  var vp=nav.find(function(n){return n.k===S.page})?S.page:nav[0].k;
  var sw=showWow();

  // ── Header ──
  var hdr=dv({cls:'hdr'});
  var ht=dv({cls:'htitle'});
  ht.innerHTML='GAMER <em>LOGBUCH</em>';
  if(sw)ht.appendChild(mk('span',{cls:'wow-badge',text:'WoW'}));
  hdr.appendChild(ht);
  var sr=dv({cls:'srow'});
  sr.appendChild(mk('span',{text:'🔍',style:{color:'#72767d',flexShrink:0}}));
  var si=Inp({type:'text',value:S.search,placeholder:'Charakter, Spiel oder Notiz suchen...'});
  si.addEventListener('input',function(e){setState({search:e.target.value})});
  sr.appendChild(si);
  if(S.search){
    var xb=mk('span',{text:'✕',style:{cursor:'pointer',color:'#72767d',paddingLeft:'4px',flexShrink:0}});
    xb.addEventListener('click',function(){setState({search:''})});
    sr.appendChild(xb);
  }
  hdr.appendChild(sr);
  var cats=dv({cls:'cats'});
  ['Alle','WoW','MMO','RPG','Shooter','Andere'].forEach(function(c){
    var ct=mk('div',{cls:'cat'+(S.cat===c?' on':''),text:c});
    ct.addEventListener('click',function(){setState({cat:c})});
    cats.appendChild(ct);
  });
  hdr.appendChild(cats);
  app.appendChild(hdr);

  // ── Content ──
  var content=dv({cls:'content'});
  if(vp==='chars')content.appendChild(pageChars());
  else if(vp==='weekly')content.appendChild(pageWeekly());
  else if(vp==='goals')content.appendChild(pageGoals());
  else if(vp==='achievements')content.appendChild(pageAch());
  else if(vp==='notes')content.appendChild(pageNotes());
  app.appendChild(content);

  // ── FAB ──
  var fabWrap=dv({cls:'fab-wrap'});
  if(S.fab){
    var menu=dv({cls:'fab-menu'});
    [{l:'Neuen Charakter',m:'char'},{l:sw?'Weekly starten':'Ziel hinzufügen',m:'goal'},{l:'Notiz schreiben',m:'note'}].forEach(function(it){
      var b=mk('button',{cls:'fab-item',text:it.l});
      (function(modal){b.addEventListener('click',function(){setState({modal:modal,fab:false})})})(it.m);
      menu.appendChild(b);
    });
    fabWrap.appendChild(menu);
  }
  var fb=mk('button',{cls:'fab-btn'+(S.fab?' open':''),text:S.fab?'✕':'+'});
  fb.addEventListener('click',function(){setState({fab:!S.fab})});
  fabWrap.appendChild(fb);
  app.appendChild(fabWrap);

  // ── Nav ──
  var navEl=dv({cls:'nav'});
  nav.forEach(function(n){
    var b=mk('button',{cls:'nb'+(vp===n.k?' on':''),text:n.l});
    (function(k){b.addEventListener('click',function(){setState({page:k,fab:false})})})(n.k);
    navEl.appendChild(b);
  });
  app.appendChild(navEl);

  // ── Modal ──
  if(S.modal){
    var ov=dv({cls:'ov'});
    ov.addEventListener('click',function(e){if(e.target===ov)setState({modal:null})});
    if(S.modal==='char')ov.appendChild(modalChar());
    else if(S.modal==='goal')ov.appendChild(modalGoal());
    else if(S.modal==='note')ov.appendChild(modalNote());
    app.appendChild(ov);
  }
}

// Start
render();
</script>
