<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2f3136;font-family:'Segoe UI',sans-serif;font-size:14px;color:#dcddde}
#app{max-width:480px;margin:0 auto;background:#36393f;border-left:2px solid #23262a;border-right:2px solid #23262a;box-shadow:0 0 20px rgba(0,0,0,0.5);min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#2f3136;padding:10px 14px 0;border-bottom:1px solid #202225;flex-shrink:0}
.htitle{text-align:center;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.htitle em{color:#7289da;font-style:normal}
.wow-badge{font-size:10px;background:#ff7d0a33;color:#ff7d0a;border:1px solid #ff7d0a55;border-radius:10px;padding:2px 8px;font-weight:700}
.srow{display:flex;align-items:center;background:#40444b;border-radius:6px;padding:5px 10px;margin-bottom:8px;border:1px solid #202225;gap:7px}
.srow input{background:none;border:none;outline:none;color:#dcddde;font-size:13px;flex:1;font-family:inherit}
.srow input::placeholder{color:#72767d}
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{background:#40444b;border:1px solid #4f545c;border-radius:20px;padding:3px 12px;font-size:12px;color:#b9bbbe;cursor:pointer;white-space:nowrap;user-select:none}
.cat.on{background:#5865f2;border-color:#5865f2;color:#fff;font-weight:600}
.content{flex:1;padding:12px;overflow-y:auto}
.nav{display:flex;background:#2f3136;border-top:1px solid #202225;height:38px;flex-shrink:0}
.nb{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:#72767d;font-size:11px;font-weight:500;font-family:'Segoe UI',sans-serif;padding:0;border-right:1px solid #202225;transition:color .15s;white-space:nowrap}
.nb:last-child{border-right:none}
.nb.on{color:#7289da;font-weight:600}
.nb:hover:not(.on){color:#b9bbbe}
.card{background:#40444b;border-radius:8px;border:1px solid #202225;margin-bottom:10px;position:relative;overflow:hidden}
.ptitle{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:#fff;letter-spacing:1px}
.rowhdr{display:flex;align-items:center;margin-bottom:14px}
.empty{text-align:center;padding:50px 20px;color:#72767d}
.empty .ico{font-size:34px;margin-bottom:10px;opacity:.4}
.wtog{display:flex;align-items:center;justify-content:space-between;background:#40444b;border:1px solid #4f545c;border-radius:10px;padding:10px 14px;margin-bottom:12px;cursor:pointer}
.wtog.on{background:linear-gradient(135deg,#5865f215,#7289da08);border-color:#5865f255;box-shadow:0 0 16px #5865f222,inset 0 0 20px #5865f208}
.wtog-txt{font-size:13px;font-weight:600;color:#b9bbbe;transition:.3s}
.wtog.on .wtog-txt{color:#a5b4fc}
.wtog-sub{font-size:11px;color:#72767d;transition:.3s}
.wtog.on .wtog-sub{color:#7289da99}
.pill{width:40px;height:22px;border-radius:11px;background:#4f545c;position:relative;transition:.3s;flex-shrink:0}
.pill.on{background:#5865f2;box-shadow:0 0 10px #5865f277,0 0 20px #5865f244}
.pill::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.25s}
.pill.on::after{left:21px}
.cb{width:20px;height:20px;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid #4f545c;background:transparent;transition:.2s}
.cb.on{background:#57f287;border-color:#57f287}
@keyframes glw{0%{box-shadow:0 0 0 0 #57f28777}100%{box-shadow:0 0 14px 5px #57f28700}}
.glw{animation:glw .6s ease-out}
.crow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #202225}
.crow:last-child{border-bottom:none}
.stitle{font-size:11px;color:#72767d;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px}
.vs{flex:1;height:24px;border-radius:4px;cursor:pointer;border:1px solid #4f545c;background:#2f3136;transition:.2s}
.vs.on{background:#ffd700;border-color:#ffd700}
.pb{height:5px;background:#2f3136;border-radius:3px;overflow:hidden;margin:6px 0 3px}
.pbf{height:100%;border-radius:3px;transition:.5s}
.fi{width:100%;background:#2f3136;border:1px solid #4f545c;border-radius:6px;padding:8px 10px;color:#dcddde;font-size:14px;outline:none;font-family:inherit}
.fi:focus{border-color:#5865f2}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:#72767d;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.bp{width:100%;background:#5865f2;border:none;border-radius:8px;padding:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit}
.bs{width:100%;background:#4f545c;border:none;border-radius:8px;padding:10px;color:#b9bbbe;font-size:14px;cursor:pointer;margin-top:6px;font-family:inherit}
.fab-wrap{padding:10px 14px 14px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;position:relative}
.fab-btn{width:48px;height:48px;border-radius:50%;background:#5865f2;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;box-shadow:0 4px 20px #5865f255;flex-shrink:0;align-self:flex-end}
.fab-menu{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab-item{display:flex;align-items:center;gap:8px;background:#40444b;border:1px solid #4f545c;border-radius:20px;padding:7px 14px;cursor:pointer;color:#dcddde;font-size:13px;font-weight:500;box-shadow:0 2px 16px #00000066;white-space:nowrap;font-family:inherit}
.ov{position:fixed;inset:0;background:#000000aa;z-index:800;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#40444b;border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;border-top:1px solid #4f545c;max-height:85vh;overflow-y:auto}
.mtitle{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:#fff;text-align:center;margin-bottom:16px}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.delbtn{background:none;border:none;cursor:pointer;color:#72767d;padding:4px;font-size:16px}
.ninput{background:none;border:none;outline:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:#fff;flex:1;min-width:0}
.csel{display:inline-flex;align-items:center;gap:6px;border:1px solid #4f545c;border-radius:20px;padding:5px 12px;cursor:pointer;margin-right:6px;margin-bottom:6px}
.csel.on{background:#5865f2;border-color:#5865f2}

          ]),
          ok?dv({style:{color:'#57f287',fontSize:'20px'}},['✓']):dv({style:{display:'flex',flexDirection:'column',gap:'4px'}},[
            bt({onclick:()=>set({ach:{...S.ach,[a.id]:Math.min(a.max,(S.ach[a.id]||0)+1)}}),style:{background:'#4f545c',border:'none',borderRadius:'4px',color:'#57f287',cursor:'pointer',padding:'3px 9px',fontSize:'15px'}},['+']),
            bt({onclick:()=>set({ach:{...S.ach,[a.id]:Math.max(0,(S.ach[a.id]||0)-1)}}),style:{background:'#4f545c',border:'none',borderRadius:'4px',color:'#ed4245',cursor:'pointer',padding:'3px 9px',fontSize:'15px'}},['−']),
          ]),
        ]),
      ]);
    }),
  ]);
}
function pgNotes(){
  let f=[...S.notes];if(S.search)f=f.filter(n=>n.title.toLowerCase().includes(S.search.toLowerCase())||(n.body||'').toLowerCase().includes(S.search.toLowerCase()));
  return dv({},[
    dv({className:'rowhdr'},[el('span',{className:'ptitle'},'📝 NOTIZEN'),el('span',{style:{marginLeft:'auto',fontSize:'11px',color:'#72767d'}},S.notes.length+' Notizen')]),
    f.length===0?dv({className:'empty'},[dv({className:'ico'},'📄'),el('p',{},'Keine Notizen.\nTippe auf + um eine Notiz zu erstellen.')]):
    dv({},[...f.map(n=>{
      const wrap=dv({className:'card',style:{padding:'12px 14px'}},[]);
      const top=dv({style:{display:'flex',alignItems:'center',marginBottom:'8px'}},[]);
      const ni=inp({type:'text',value:n.title,placeholder:'Titel...',className:'ninput'});
      ni.addEventListener('input',e=>set({notes:S.notes.map(x=>x.id===n.id?{...x,title:e.target.value}:x)}));
      top.appendChild(ni);
      top.appendChild(el('span',{style:{fontSize:'10px',background:'#5865f233',color:'#7289da',padding:'2px 8px',borderRadius:'10px',fontWeight:600,marginRight:'6px',flexShrink:0}},n.tag||'Notiz'));
      top.appendChild(bt({className:'delbtn',onclick:()=>set({notes:S.notes.filter(x=>x.id!==n.id)})},['🗑']));
      const ta=txta({className:'fi',rows:3,placeholder:'Taktik, Loot-Liste, Hinweise...',style:{resize:'vertical',lineHeight:'1.5',minHeight:'65px'}},n.body||'');
      ta.addEventListener('input',e=>set({notes:S.notes.map(x=>x.id===n.id?{...x,body:e.target.value}:x)}));
      wrap.appendChild(top);wrap.appendChild(ta);return wrap;
    })]),
  ]);
}
function mChar(){
  let f={name:'',game:'wow',cls:'warrior',ilvl:'',role:''};
  const wrap=dv({className:'modal'},[dv({className:'mtitle'},'Charakter hinzufügen')]);
  function rebuild(){
    while(wrap.children.length>1)wrap.removeChild(wrap.lastChild);
    const ww=iw(f.game),c=cI(f.cls),g=gI(f.game);
    const gs=sel2({className:'fi'},GAMES.map(g2=>({v:g2.key,l:g2.emoji+' '+g2.label})),f.game);
    gs.addEventListener('change',e=>{f.game=e.target.value;rebuild()});
    wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Spiel'),gs]));
    const ni=inp({type:'text',placeholder:ww?'z.B. Arthas':'z.B. Tarnished',value:f.name,className:'fi'});
    ni.addEventListener('input',e=>f.name=e.target.value);
    wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Name'),ni]));
    if(ww){
      const cs=sel2({className:'fi'},WC.map(c2=>({v:c2.key,l:c2.name})),f.cls);
      cs.addEventListener('change',e=>{f.cls=e.target.value;rebuild()});
      wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Klasse'),cs,dv({style:{marginTop:'5px',fontSize:'12px',color:c.color,fontWeight:700}},'● '+c.name)]));
      const ii=inp({type:'number',placeholder:'z.B. 650',value:f.ilvl,className:'fi'});
      ii.addEventListener('input',e=>f.ilvl=e.target.value);
      wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Itemlevel'),ii]));
    } else {
      const ri=inp({type:'text',placeholder:'z.B. Krieger, Tank',value:f.role,className:'fi'});
      ri.addEventListener('input',e=>f.role=e.target.value);
      wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Klasse / Rolle'),ri]));
    }
    wrap.appendChild(dv({style:{padding:'8px 12px',background:g.color+'11',border:`1px solid ${g.color}33`,borderRadius:'6px',marginBottom:'12px',fontSize:'12px',color:g.color}},g.emoji+' '+g.label+(ww?' · WoW Pro-Features aktiv':'')));
    wrap.appendChild(bt({className:'bp',onclick:()=>{if(!f.name.trim())return;set({chars:[...S.chars,{...f,id:'c'+Date.now()}],modal:null,page:'chars'})}},['Charakter speichern']));
    wrap.appendChild(bt({className:'bs',onclick:()=>set({modal:null})},['Abbrechen']));
  }
  rebuild();return wrap;
}
function mGoal(){
  let f={title:'',game:'wow',prio:'Mittel',notes:''};
  const sw=S.chars.some(c=>iw(c.game))||S.wow;
  const wrap=dv({className:'modal'},[dv({className:'mtitle'},sw?'Weekly starten':'Ziel hinzufügen')]);
  const gs=sel2({className:'fi'},GAMES.map(g=>({v:g.key,l:g.emoji+' '+g.label})),f.game);gs.addEventListener('change',e=>f.game=e.target.value);
  wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Spiel'),gs]));
  const ti=inp({type:'text',placeholder:'z.B. M+15 abschließen',className:'fi'});ti.addEventListener('input',e=>f.title=e.target.value);
  wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Ziel / Quest'),ti]));
  const ps=sel2({className:'fi'},['Hoch','Mittel','Niedrig'],'Mittel');ps.addEventListener('change',e=>f.prio=e.target.value);
  wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Priorität'),ps]));
  const ni=inp({type:'text',placeholder:'Kurze Notiz...',className:'fi'});ni.addEventListener('input',e=>f.notes=e.target.value);
  wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Notiz (optional)'),ni]));
  wrap.appendChild(bt({className:'bp',onclick:()=>{if(!f.title.trim())return;set({goals:[{...f,id:'g'+Date.now(),done:false},...S.goals],modal:null,page:sw?'weekly':'goals'})}},['Ziel speichern']));
  wrap.appendChild(bt({className:'bs',onclick:()=>set({modal:null})},['Abbrechen']));
  return wrap;
}
function mNote(){
  let f={title:'',body:'',tag:'Notiz'};
  const wrap=dv({className:'modal'},[dv({className:'mtitle'},'Neue Notiz')]);
  const ti=inp({type:'text',placeholder:'z.B. Fyrakk Taktik',className:'fi'});ti.addEventListener('input',e=>f.title=e.target.value);
  wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Titel'),ti]));
  const ts=sel2({className:'fi'},['Notiz','WoW','Raid','M+','PvP','Loot','Strategie','Build','Andere'],'Notiz');ts.addEventListener('change',e=>f.tag=e.target.value);
  wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Kategorie'),ts]));
  const ta=txta({className:'fi',rows:4,placeholder:'Taktik, Loot, Build, Hinweise...',style:{resize:'vertical',minHeight:'80px'}});ta.addEventListener('input',e=>f.body=e.target.value);
  wrap.appendChild(dv({className:'fg'},[el('label',{className:'fl'},'Notiz'),ta]));
  wrap.appendChild(bt({className:'bp',onclick:()=>{if(!f.title.trim())return;set({notes:[{...f,id:'n'+Date.now()},...S.notes],modal:null,page:'notes'})}},['Notiz speichern']));
  wrap.appendChild(bt({className:'bs',onclick:()=>set({modal:null})},['Abbrechen']));
  return wrap;
}
function navDef(){
  const sw=S.chars.some(c=>iw(c.game))||S.wow;
  return[
    {k:'chars',l:'Charaktere'},
    ...(sw?[{k:'weekly',l:'Weekly'}]:[{k:'goals',l:'Ziele'}]),
    {k:'achievements',l:'Erfolge'},
    {k:'notes',l:'Notizen'},
  ];
}
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const nav=navDef();
  const vp=nav.find(n=>n.k===S.page)?S.page:nav[0].k;
  const sw=S.chars.some(c=>iw(c.game))||S.wow;
  const hdr=dv({className:'hdr'},[]);
  const ht=dv({className:'htitle'},[]);
  ht.innerHTML='GAMER <em>LOGBUCH</em>';
  if(sw)ht.appendChild(el('span',{className:'wow-badge'},'WoW'));
  hdr.appendChild(ht);
  const sr=dv({className:'srow'},[]);
  sr.appendChild(el('span',{style:{color:'#72767d',fontSize:'13px',flexShrink:0}},'🔍'));
  const si=inp({type:'text',value:S.search,placeholder:'Charakter, Spiel oder Notiz suchen...'});
  si.addEventListener('input',e=>set({search:e.target.value}));
  sr.appendChild(si);
  if(S.search){const xb=el('span',{style:{cursor:'pointer',color:'#72767d',paddingLeft:'4px',flexShrink:0}},'✕');xb.addEventListener('click',()=>set({search:''}));sr.appendChild(xb);}
  hdr.appendChild(sr);
  const cats=dv({className:'cats'},[]);
  ['Alle','WoW','MMO','RPG','Shooter','Andere'].forEach(c=>{
    const ct=dv({className:'cat'+(S.cat===c?' on':'')},c);
    ct.addEventListener('click',()=>set({cat:c}));cats.appendChild(ct);
  });
  hdr.appendChild(cats);
  app.appendChild(hdr);
  const content=dv({className:'content'},[]);
  if(vp==='chars')content.appendChild(pgChars());
  else if(vp==='weekly')content.appendChild(pgWeekly());
  else if(vp==='goals')content.appendChild(pgGoals());
  else if(vp==='achievements')content.appendChild(pgAch());
  else if(vp==='notes')content.appendChild(pgNotes());
  app.appendChild(content);
  const fabWrap=dv({className:'fab-wrap'},[]);
  if(S.fabOpen){
    const menu=dv({className:'fab-menu'},[]);
    [{l:'Neuen Charakter',fn:()=>set({modal:'char',fabOpen:false})},{l:sw?'Weekly starten':'Ziel hinzufügen',fn:()=>set({modal:'goal',fabOpen:false})},{l:'Notiz schreiben',fn:()=>set({modal:'note',fabOpen:false})}].forEach(it=>{
      menu.appendChild(bt({className:'fab-item',onclick:it.fn},it.l));
    });
    fabWrap.appendChild(menu);
  }
  fabWrap.appendChild(bt({className:'fab-btn',onclick:()=>set({fabOpen:!S.fabOpen})},S.fabOpen?'✕':'+'));
  app.appendChild(fabWrap);
  const navEl=dv({className:'nav'},[]);
  nav.forEach(n=>{
    navEl.appendChild(bt({className:'nb'+(vp===n.k?' on':''),onclick:()=>set({page:n.k})},[n.l]));
  });
  app.appendChild(navEl);
  if(S.modal){
    const ov=dv({className:'ov'},[]);
    ov.addEventListener('click',e=>{if(e.target===ov)set({modal:null})});
    if(S.modal==='char')ov.appendChild(mChar());
    else if(S.modal==='goal')ov.appendChild(mGoal());
    else if(S.modal==='note')ov.appendChild(mNote());
    app.appendChild(ov);
  }
}
render();
</script>
</body>
</html>
