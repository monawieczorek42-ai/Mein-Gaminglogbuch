<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:linear-gradient(160deg,#0f0f12 0%,#13131a 60%,#1a1a22 100%);background-attachment:fixed;color:#dcddde;font-family:'Poppins',sans-serif;font-size:14px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;border-left:1px solid #ffffff0a;border-right:1px solid #ffffff0a}
.hdr{background:#0d0d13ee;padding:12px 14px 0;border-bottom:1px solid #ffffff0d;flex-shrink:0;position:sticky;top:0;z-index:50}
.htitle{text-align:center;font-size:20px;font-weight:700;letter-spacing:1px;color:#fff;margin-bottom:10px;text-transform:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htitle em{color:#7289da;font-style:normal;font-weight:800;text-shadow:0 0 10px rgba(114,137,218,0.5)}
.wow-badge{font-size:9px;background:#ff7d0a20;color:#ff7d0a;border:1px solid #ff7d0a44;border-radius:10px;padding:2px 8px;font-weight:700;margin-left:6px;vertical-align:middle}
.srow{display:flex;align-items:center;background:#1e1e2a;border-radius:8px;padding:7px 12px;margin-bottom:10px;border:1px solid #ffffff0d;gap:8px}
.srow input{background:none;border:none;outline:none;color:#dcddde;font-size:13px;flex:1;font-family:inherit}
.srow input::placeholder{color:#44445a}
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{background:#1e1e2a;border:1px solid #ffffff0d;border-radius:20px;padding:4px 14px;font-size:11px;color:#55556a;cursor:pointer;white-space:nowrap;user-select:none;flex-shrink:0}
.cat.on{background:#5865f228;border-color:#5865f255;color:#a5b4fc;font-weight:600}
.content{flex:1;padding:14px;overflow-y:auto}
.nav{display:flex;background:#0d0d13ee;border-top:1px solid #ffffff0d;flex-shrink:0;position:sticky;bottom:0;z-index:50}
.nb{flex:1;padding:11px 4px;cursor:pointer;border:none;background:none;color:#44445a;font-size:11px;font-weight:500;font-family:inherit;border-right:1px solid #ffffff0d;white-space:nowrap;text-align:center;transition:color .15s}
.nb:last-child{border-right:none}
.nb.on{color:#7289da;font-weight:700}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:#1c1c26;border-radius:12px;border:1px solid #ffffff0d;margin-bottom:10px;position:relative;overflow:hidden;animation:fadeUp .3s ease both}
.crow2{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ptitle{font-size:16px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase}
.rowhdr{display:flex;align-items:center;margin-bottom:12px}
.empty{text-align:center;padding:50px 20px;color:#44445a}
.wtog{display:flex;align-items:center;justify-content:space-between;background:#1c1c26;border:1px solid #ffffff0d;border-radius:12px;padding:11px 14px;margin-bottom:12px;cursor:pointer;user-select:none;transition:border-color .3s,box-shadow .3s}
.wtog.on{border-color:#5865f240;box-shadow:0 0 0 1px #5865f215,0 4px 20px #5865f215}
.wlbl{font-size:13px;font-weight:600;color:#55556a;transition:color .3s}
.wtog.on .wlbl{color:#a5b4fc}
.wsub{font-size:11px;color:#44445a;margin-top:2px;transition:color .3s}

  var vi=mk('div','','');styl(vi,{fontSize:'11px',color:'#44445a',marginTop:'6px'});vi.textContent=(w.vault||0)+'/3 '+((w.vault||0)===3?'✨ Vault voll!':'Slots gefüllt');body.appendChild(vi);
  ap(card,body);
  // Weekly Global Todos
  var tcard=dv('card');tcard.style.animationDelay='0.1s';
  var thead=dv('');styl(thead,{padding:'12px 14px 0'});
  var tHdr=mk('div','stit','🗓️  Wöchentliche Ziele');
  var done=WTODOS.filter(function(t){return S.wtodos[t.id]}).length;
  var pct=Math.round(done/WTODOS.length*100);
  var pbarWrap=dv('pbar-wrap');var pbarFill=dv('pbar-fill');pbarFill.style.width=pct+'%';pbarWrap.appendChild(pbarFill);
  var pInfo=mk('div','','');styl(pInfo,{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#44445a',marginBottom:'8px'});
  var pLeft=sp('','Wöchentlicher Fortschritt');var pRight=sp('',done+'/'+WTODOS.length+' ('+pct+'%)');pRight.style.color=pct===100?'#57f287':'#55556a';
  ap(pInfo,pLeft,pRight);ap(thead,tHdr,pInfo,pbarWrap);tcard.appendChild(thead);
  var tbody=dv('');body.style.padding='0 14px 14px';styl(tbody,{padding:'4px 14px 14px'});
  WTODOS.forEach(function(t){
    var row=dv('wrow');
    var checked=!!S.wtodos[t.id];
    (function(tid){row.appendChild(cbEl(checked,function(){var nw=Object.assign({},S.wtodos);nw[tid]=!nw[tid];set({wtodos:nw})}))})(t.id);
    var lbl=sp('');lbl.textContent=t.l;styl(lbl,{flex:1,fontSize:'13px',color:checked?'#44445a':'#dcddde',textDecoration:checked?'line-through':'none'});
    row.appendChild(lbl);tbody.appendChild(row);
  });
  tcard.appendChild(tbody);
  ap(wrap,card,tcard);return wrap;
}

function pgGoals(){
  var f=S.goals.slice();if(S.search)f=f.filter(function(g){return g.title.toLowerCase().indexOf(S.search.toLowerCase())>=0});
  var pC={Hoch:'#ed4245',Mittel:'#faa61a',Niedrig:'#57f287'};
  var wrap=dv('');var hdr=dv('rowhdr');ap(hdr,sp('ptitle','Ziele'),styl(sp('',''+S.goals.filter(function(g){return g.done}).length+'/'+S.goals.length),{marginLeft:'auto',fontSize:'11px',color:'#44445a'}));wrap.appendChild(hdr);
  if(!f.length){var em=dv('empty');ap(em,mk('div','','🎯'),mk('p','','Keine Ziele. Tippe auf + um ein Ziel anzulegen.'));wrap.appendChild(em)}
  else f.forEach(function(g,i){
    var g2=gi(g.game);var card=dv('card');card.style.animationDelay=(i*0.05)+'s';if(g.done)styl(card,{borderColor:'#57f28728'});
    var row=dv('');styl(row,{padding:'11px 14px',display:'flex',alignItems:'center',gap:'8px'});
    (function(gid){row.appendChild(cbEl(!!g.done,function(){set({goals:S.goals.map(function(x){return x.id===gid?Object.assign({},x,{done:!x.done}):x})})}))})(g.id);
    var inf=dv('');styl(inf,{flex:1,minWidth:0});
    var tit=mk('div','','');styl(tit,{fontWeight:600,fontSize:'13px',color:g.done?'#44445a':'#e8e8f0',textDecoration:g.done?'line-through':'none'});tit.textContent=g.title;inf.appendChild(tit);
    var tags=dv('');styl(tags,{display:'flex',flexWrap:'wrap',marginTop:'3px'});
    var t1=sp('chip',g2.e+' '+g2.s);styl(t1,{background:g2.c+'18',color:g2.c,borderColor:g2.c+'30'});tags.appendChild(t1);
    if(g.prio){var t2=sp('chip',g.prio);styl(t2,{background:(pC[g.prio]||'#888')+'18',color:pC[g.prio]||'#888',borderColor:(pC[g.prio]||'#888')+'30'});tags.appendChild(t2)}
    inf.appendChild(tags);row.appendChild(inf);
    (function(gid){row.appendChild(bt('delbtn','🗑',function(){set({goals:S.goals.filter(function(x){return x.id!==gid})})}))})(g.id);
    ap(card,row);wrap.appendChild(card);
  });
  return wrap;
}

function pgAch(){
  var done=ACH.filter(function(a){return(S.ach[a.id]||0)>=a.m}).length;
  var wrap=dv('');var hdr=dv('rowhdr');ap(hdr,sp('ptitle','Erfolge'),styl(sp('',''+done+'/'+ACH.length),{marginLeft:'auto',fontSize:'11px',color:'#44445a'}));wrap.appendChild(hdr);
  ACH.forEach(function(a,i){
    var p=S.ach[a.id]||0,pct=Math.min(100,Math.round(p/a.m*100)),ok=pct>=100;
    var card=dv('card');card.style.animationDelay=(i*0.04)+'s';if(ok)styl(card,{borderColor:'#57f28728',boxShadow:'0 0 14px #57f28714'});
    var row=dv('');styl(row,{padding:'12px 14px',display:'flex',gap:'12px',alignItems:'center'});
    var ico=dv('');styl(ico,{width:'44px',height:'44px',borderRadius:'10px',flexShrink:0,background:ok?'#57f28718':'#13131a',border:'1px solid '+(ok?'#57f28735':'#ffffff0d'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'});ico.textContent=a.e;row.appendChild(ico);
    var inf=dv('');styl(inf,{flex:1,minWidth:0});
    ap(inf,styl(mk('div','',a.n),{fontWeight:600,fontSize:'13px',color:'#e8e8f0',marginBottom:'2px'}),styl(mk('div','',a.d),{fontSize:'11px',color:'#44445a'}));
    var pb=dv('pb');var pbf=dv('pbf');styl(pbf,{width:pct+'%',background:ok?'#57f287':'linear-gradient(90deg,#5865f2,#57f287)'});pb.appendChild(pbf);inf.appendChild(pb);
    ap(inf,styl(mk('div','',p+'/'+a.m+' '+(ok?'✓ Abgeschlossen':pct+'%')),{fontSize:'10px',color:ok?'#57f287':'#44445a',fontWeight:600}));
    row.appendChild(inf);
    if(ok)row.appendChild(styl(sp('','✓'),{color:'#57f287',fontSize:'20px',textShadow:'0 0 8px #57f28760'}));
    else{
      var btns=dv('');styl(btns,{display:'flex',flexDirection:'column',gap:'4px'});
      (function(aid,am){
        var bp=bt('','',null);bp.textContent='+';styl(bp,{background:'#57f28718',border:'1px solid #57f28730',borderRadius:'6px',color:'#57f287',cursor:'pointer',padding:'5px 10px',fontSize:'14px',fontWeight:700});
        bp.onclick=function(){var na=Object.assign({},S.ach);na[aid]=Math.min(am,(S.ach[aid]||0)+1);set({ach:na})};
        var bm=bt('','',null);bm.textContent='−';styl(bm,{background:'#ed424518',border:'1px solid #ed424530',borderRadius:'6px',color:'#ed4245',cursor:'pointer',padding:'5px 10px',fontSize:'14px',fontWeight:700});
        bm.onclick=function(){var na=Object.assign({},S.ach);na[aid]=Math.max(0,(S.ach[aid]||0)-1);set({ach:na})};
        ap(btns,bp,bm);
      })(a.id,a.m);row.appendChild(btns);
    }
    ap(card,row);wrap.appendChild(card);
  });
  return wrap;
}

function pgNotes(){
  var f=S.notes.slice();if(S.search)f=f.filter(function(n){return n.title.toLowerCase().indexOf(S.search.toLowerCase())>=0||(n.body||'').toLowerCase().indexOf(S.search.toLowerCase())>=0});
  var wrap=dv('');var hdr=dv('rowhdr');ap(hdr,sp('ptitle','Notizen'),styl(sp('',''+S.notes.length+' Notizen'),{marginLeft:'auto',fontSize:'11px',color:'#44445a'}));wrap.appendChild(hdr);
  if(!f.length){var em=dv('empty');ap(em,mk('div','','📄'),mk('p','','Keine Notizen. Tippe auf + um eine Notiz zu erstellen.'));wrap.appendChild(em)}
  else f.forEach(function(n,i){
    var card=dv('card');card.style.cssText+='padding:13px 15px';card.style.animationDelay=(i*0.05)+'s';
    var top=dv('');styl(top,{display:'flex',alignItems:'center',marginBottom:'9px'});
    var ni=inpEl('text',n.title,'Titel...','ni');
    (function(nid){ni.oninput=function(e){set({notes:S.notes.map(function(x){return x.id===nid?Object.assign({},x,{title:e.target.value}):x})})}})(n.id);
    top.appendChild(ni);
    var tag=sp('');tag.textContent=n.tag||'Notiz';styl(tag,{fontSize:'10px',background:'#5865f218',color:'#7289da',padding:'2px 8px',borderRadius:'10px',fontWeight:600,marginRight:'6px',flexShrink:0,border:'1px solid #5865f230'});top.appendChild(tag);
    (function(nid){top.appendChild(bt('delbtn','🗑',function(){set({notes:S.notes.filter(function(x){return x.id!==nid})})}))})(n.id);
    var ta=document.createElement('textarea');ta.className='fi';ta.value=n.body||'';ta.placeholder='Taktik, Loot-Liste, Hinweise...';ta.style.cssText='resize:vertical;line-height:1.5;min-height:70px';
    (function(nid){ta.oninput=function(e){set({notes:S.notes.map(function(x){return x.id===nid?Object.assign({},x,{body:e.target.value}):x})})}})(n.id);
    ap(card,top,ta);wrap.appendChild(card);
  });
  return wrap;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function mChar(){
  var f={name:'',game:'wow',cls:'warrior',ilvl:'',mscore:'',role:'',active:false};
  var wrap=dv('modal');wrap.appendChild(mk('div','mtit','Charakter hinzufügen'));
  function rb(){
    while(wrap.children.length>1)wrap.removeChild(wrap.lastChild);
    var ww=iw(f.game),c=ci(f.cls),g=gi(f.game);
    var fg1=dv('fg');fg1.appendChild(mk('label','fl','Spiel'));var gs=selEl(GS.map(function(g2){return{v:g2.k,l:g2.e+' '+g2.l}}),f.game);gs.onchange=function(e){f.game=e.target.value;rb()};fg1.appendChild(gs);wrap.appendChild(fg1);
    var fg2=dv('fg');fg2.appendChild(mk('label','fl','Name'));var ni=inpEl('text',f.name,ww?'z.B. Arthas':'z.B. Tarnished','fi');ni.oninput=function(e){f.name=e.target.value};fg2.appendChild(ni);wrap.appendChild(fg2);
    if(ww){
      // Class picker
      var fg3=dv('fg');fg3.appendChild(mk('label','fl','Klasse'));var pw=dv('');
      function rp(){pw.innerHTML='';pw.appendChild(cpickerEl(f.cls,function(k){f.cls=k;rp()}));var sc=ci(f.cls);var h=mk('div','hint','● '+sc.n);h.style.color=sc.c;pw.appendChild(h)}
      rp();fg3.appendChild(pw);wrap.appendChild(fg3);
      // iLvl + Score row
      var fgRow=dv('fg');fgRow.appendChild(mk('label','fl','iLvl & M+ Score'));
      var row2=dv('');styl(row2,{display:'flex',gap:'8px'});
      var ii=inpEl('number',f.ilvl,'iLvl z.B. 650','fi-sm');ii.oninput=function(e){f.ilvl=e.target.value};
      var si2=inpEl('number',f.mscore,'Score z.B. 2400','fi-sm');si2.style.flex='1';si2.oninput=function(e){f.mscore=e.target.value};
      ap(row2,ii,si2);fgRow.appendChild(row2);wrap.appendChild(fgRow);
    }else{
      var fg5=dv('fg');fg5.appendChild(mk('label','fl','Klasse / Rolle'));var ri=inpEl('text',f.role,'z.B. Krieger, Tank','fi');ri.oninput=function(e){f.role=e.target.value};fg5.appendChild(ri);wrap.appendChild(fg5);
    }
    var h2=mk('div','','');styl(h2,{padding:'9px 12px',background:g.c+'12',border:'1px solid '+g.c+'25',borderRadius:'8px',marginBottom:'12px',fontSize:'12px',color:g.c});h2.textContent=g.e+' '+g.l+(ww?' · WoW Pro aktiv':'');wrap.appendChild(h2);
    wrap.appendChild(bt('bp','✓  Charakter speichern',function(){if(!f.name.trim())return;set({chars:S.chars.concat([Object.assign({},f,{id:'c'+Date.now()})]),modal:null,page:'chars'})}));
    wrap.appendChild(bt('bs','Abbrechen',function(){set({modal:null})}));
  }
  rb();return wrap;
}
function mGoal(){
  var f={title:'',game:'wow',prio:'Mittel'};var sw=showWow();
  var wrap=dv('modal');wrap.appendChild(mk('div','mtit',sw?'Weekly starten':'Ziel hinzufügen'));
  var fg1=dv('fg');fg1.appendChild(mk('label','fl','Spiel'));var gs=selEl(GS.map(function(g){return{v:g.k,l:g.e+' '+g.l}}),f.game);gs.onchange=function(e){f.game=e.target.value};fg1.appendChild(gs);wrap.appendChild(fg1);
  var fg2=dv('fg');fg2.appendChild(mk('label','fl','Ziel / Quest'));var ti=inpEl('text',f.title,'z.B. M+15 abschließen','fi');ti.oninput=function(e){f.title=e.target.value};fg2.appendChild(ti);wrap.appendChild(fg2);
  var fg3=dv('fg');fg3.appendChild(mk('label','fl','Priorität'));var ps=selEl(['Hoch','Mittel','Niedrig'],'Mittel');ps.onchange=function(e){f.prio=e.target.value};fg3.appendChild(ps);wrap.appendChild(fg3);
  wrap.appendChild(bt('bp','✓  Ziel speichern',function(){if(!f.title.trim())return;set({goals:[Object.assign({},f,{id:'g'+Date.now(),done:false})].concat(S.goals),modal:null,page:sw?'weekly':'goals'})}));
  wrap.appendChild(bt('bs','Abbrechen',function(){set({modal:null})}));return wrap;
}
function mNote(){
  var f={title:'',body:'',tag:'Notiz'};
  var wrap=dv('modal');wrap.appendChild(mk('div','mtit','Neue Notiz'));
  var fg1=dv('fg');fg1.appendChild(mk('label','fl','Titel'));var ti=inpEl('text',f.title,'z.B. Fyrakk Taktik','fi');ti.oninput=function(e){f.title=e.target.value};fg1.appendChild(ti);wrap.appendChild(fg1);
  var fg2=dv('fg');fg2.appendChild(mk('label','fl','Kategorie'));var ts=selEl(['Notiz','WoW','Raid','M+','PvP','Loot','Strategie','Build','Andere'],'Notiz');ts.onchange=function(e){f.tag=e.target.value};fg2.appendChild(ts);wrap.appendChild(fg2);
  var fg3=dv('fg');fg3.appendChild(mk('label','fl','Notiz'));var ta=document.createElement('textarea');ta.className='fi';ta.placeholder='Taktik, Loot, Build, Hinweise...';ta.style.minHeight='90px';ta.oninput=function(e){f.body=e.target.value};fg3.appendChild(ta);wrap.appendChild(fg3);
  wrap.appendChild(bt('bp','✓  Notiz speichern',function(){if(!f.title.trim())return;set({notes:[Object.assign({},f,{id:'n'+Date.now()})].concat(S.notes),modal:null,page:'notes'})}));
  wrap.appendChild(bt('bs','Abbrechen',function(){set({modal:null})}));return wrap;

// ── RENDER ────────────────────────────────────────────────────────────────────
function navDef(){var sw=showWow();return[{k:'chars',l:'Charaktere'},sw?{k:'weekly',l:'Weekly'}:{k:'goals',l:'Ziele'},{k:'achievements',l:'Erfolge'},{k:'notes',l:'Notizen'}]}
function render(){
  var app=document.getElementById('app');app.innerHTML='';
  var nv=navDef(),vp=nv.find(function(n){return n.k===S.page})?S.page:nv[0].k,sw=showWow();
  var hdr=dv('hdr');
  var ht=mk('div','htitle','');ht.innerHTML='Gamer <em>Logbuch</em>';
  if(sw){var wb=sp('wow-badge','WoW');ht.appendChild(wb)}hdr.appendChild(ht);
  var sr=dv('srow');var sico=sp('','🔍');sico.style.cssText='color:#44445a;flex-shrink:0';sr.appendChild(sico);
  var si=inpEl('text',S.search,'Suchen...','');si.oninput=function(e){set({search:e.target.value})};sr.appendChild(si);
  if(S.search){var xb=sp('','×');styl(xb,{cursor:'pointer',color:'#44445a',paddingLeft:'4px',flexShrink:0});xb.onclick=function(){set({search:''})};sr.appendChild(xb)}
  hdr.appendChild(sr);
  var cEl=dv('cats');['Alle','WoW','MMO','RPG','Shooter','Andere'].forEach(function(c){var ct=mk('div','cat'+(S.cat===c?' on':''),c);ct.onclick=function(){set({cat:c})};cEl.appendChild(ct)});
  hdr.appendChild(cEl);app.appendChild(hdr);
  var con=dv('content');
  if(vp==='chars')con.appendChild(pgChars());else if(vp==='weekly')con.appendChild(pgWeekly());else if(vp==='goals')con.appendChild(pgGoals());else if(vp==='achievements')con.appendChild(pgAch());else if(vp==='notes')con.appendChild(pgNotes());
  app.appendChild(con);
  var fw=dv('fabw');
  if(S.fab){var fm=dv('fabm');[{l:'Neuen Charakter',m:'char'},{l:sw?'Weekly starten':'Ziel hinzufügen',m:'goal'},{l:'Notiz schreiben',m:'note'}].forEach(function(it){var b=bt('fabi',it.l,null);(function(m){b.onclick=function(){set({modal:m,fab:false})}})(it.m);fm.appendChild(b)});fw.appendChild(fm)}
  var fb=bt('fabb'+(S.fab?' open':''),S.fab?'×':'+',function(){set({fab:!S.fab})});fw.appendChild(fb);app.appendChild(fw);
  var ne=dv('nav');nv.forEach(function(n){var b=bt('nb'+(vp===n.k?' on':''),n.l,null);(function(k){b.onclick=function(){set({page:k,fab:false})}})(n.k);ne.appendChild(b)});app.appendChild(ne);
  if(S.modal){var ov=dv('ov');ov.onclick=function(e){if(e.target===ov)set({modal:null})};if(S.modal==='char')ov.appendChild(mChar());else if(S.modal==='goal')ov.appendChild(mGoal());else if(S.modal==='note')ov.appendChild(mNote());app.appendChild(ov)}
}
render();
