function charStatus(ch){
  // Gibt 'green','yellow','red' zurück
  if(!iw(ch.game))return null; // nur WoW-Chars
  var w=S.weekly[ch.id]||{};
  var tasks=[!!w.mplus,!!(w.raidN||w.raidH||w.raidM),(w.vault||0)>=3];
  var done=tasks.filter(Boolean).length;
  if(done===0)return 'red';
  if(done===tasks.length)return 'green';
  return 'yellow';
}


var _toastShown=false;
function showToastIfNeeded(){
  if(_toastShown)return;
  var wowChars=S.chars.filter(function(c){return iw(c.game)});
  if(!wowChars.length)return;
  var open=wowChars.filter(function(ch){var s=charStatus(ch);return s==='red'||s==='yellow'});
  if(!open.length)return;
  _toastShown=true;
  var toast=dv('toast');
  var title=dv('toast-title');
  title.innerHTML='⚔️ Offene Aufgaben diese Woche';
  var closeBtn=bt('toast-close','×',null);
  closeBtn.onclick=function(){
    toast.classList.add('out');
    setTimeout(function(){if(toast.parentNode)toast.parentNode.removeChild(toast)},300);
  };
  title.appendChild(closeBtn);
  toast.appendChild(title);
  open.forEach(function(ch){
    var w=S.weekly[ch.id]||{};
    var tasks=[];
    if(!w.mplus)tasks.push('M+');
    if(!w.raidN&&!w.raidH&&!w.raidM)tasks.push('Raid');
    if((w.vault||0)<3)tasks.push('Vault');
    var row=dv('toast-row');
    var st=charStatus(ch);
    var dot=dv('status-dot dot-'+st);
    var name=mk('span','toast-char',ch.name);
    var todo=mk('span','toast-tasks',tasks.join(' · ')+' offen');
    ap(row,dot,name,todo);
    toast.appendChild(row);
  });
  document.body.appendChild(toast);
  // Auto-close nach 6 Sekunden
  setTimeout(function(){
    if(!toast.parentNode)return;
    toast.classList.add('out');
    setTimeout(function(){if(toast.parentNode)toast.parentNode.removeChild(toast)},300);
  },6000);
}

      var bar=dv('');styl(bar,{position:'absolute',left:0,top:0,bottom:0,width:'3px',background:c.c,opacity:'.7',borderRadius:'12px 0 0 12px'});card.appendChild(bar)}

      var oldChar=S.chars.find(function(x){return x.id===f.id});if(oldChar&&oldChar.ilvl)f.prevIlvl=oldChar.ilvl;set({chars:S.chars.map(function(x){return x.id===f.id?f:x}),modal:null,editId:null});
    }));
    wrap.appendChild(bt('bs','Abbrechen',function(){set({modal:null,editId:null})}));
  }
  rb();return wrap;
}


function modalUpgrade(){
  var wrap=dv('modal');
  var title=mk('div','upgrade-title','🌟 PRO VERSION FREISCHALTEN');
  var sub=mk('div','upgrade-sub','Du hast das kostenlose Limit von 4 Helden erreicht.\nSchalte unbegrenzte Slots für alle deine Twinks frei!');

    li.appendChild(document.createTextNode(p.t));
    perks.appendChild(li);
  });
  var buyBtn=bt('btn-pro','Jetzt für 3,99€ freischalten',function(){
    alert('Vielen Dank! Das Bezahlsystem wird in Kürze aktiviert.');

  var laterBtn=bt('bs','Vielleicht später',function(){set({modal:null})});

function modalUpgrade(){
  var wrap=dv('modal');
  // Titel
  var title=mk('div','mtit','');
  title.innerHTML='<span style="background:linear-gradient(135deg,#c9a84c,#ffea00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">🌟 PRO VERSION</span>';
  wrap.appendChild(title);

  var features=[

function modalGold(cid){
  var ch=S.chars.find(function(x){return x.id===cid});
  if(!ch)return dv('modal');
  var wrap=dv('modal');
  var title=mk('div','mtit','💰 Gold — '+ch.name);
  wrap.appendChild(title);
  var lbl=mk('div','fl','Aktuelles Gold');lbl.style.marginBottom='4px';wrap.appendChild(lbl);
  var inputWrap=dv('gold-input-wrap');
  var inp=document.createElement('input');
  inp.type='number';inp.className='gold-input';inp.value=ch.gold||'0';inp.placeholder='0';inp.min='0';
  inputWrap.appendChild(inp);wrap.appendChild(inputWrap);
  // Schnell-Buttons
  var ql=mk('div','fl','Schnell hinzufügen');ql.style.marginBottom='6px';wrap.appendChild(ql);
  var quickRow=dv('gold-quick');
  [1000,5000,10000,50000,100000].forEach(function(v){
    var qb=bt('gold-qbtn','+'+v.toLocaleString('de-DE')+'g',function(){
      var cur=parseInt(inp.value)||0;
      inp.value=String(cur+v);
    });
    quickRow.appendChild(qb);
  });
  wrap.appendChild(quickRow);
  wrap.appendChild(bt('bp','💰 Speichern',function(){
    var val=Math.max(0,parseInt(inp.value)||0);
    set({chars:S.chars.map(function(x){return x.id===cid?Object.assign({},x,{gold:String(val)}):x}),modal:null,goldCharId:null});
  }));
  wrap.appendChild(bt('bs','Abbrechen',function(){set({modal:null,goldCharId:null})}));
  return wrap;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function navDef(){var sw=showWow();return[{k:'chars',l:'Charaktere'},sw?{k:'weekly',l:'Weekly'}:{k:'goals',l:'Ziele'},{k:'achievements',l:'Erfolge'},{k:'notes',l:'Notizen'}]}
function render(){
  var app=document.getElementById('app');app.innerHTML='';
  var nv=navDef(),vp=nv.find(function(n){return n.k===S.page})?S.page:nv[0].k,sw=showWow();
  var hdr=dv('hdr');
  var ht=mk('div','htitle','');ht.innerHTML='Gamer <em>Logbuch</em>';
  if(sw){var wb=sp('wow-badge','WoW');ht.appendChild(wb)}hdr.appendChild(ht);
  var sr=dv('srow');var sico=sp('','🔍');sico.style.cssText='color:#44445a;flex-shrink:0';sr.appendChild(sico);
  var si=inpEl('text',S.search,'Suchen...','');si.oninput=function(e){set({search:e.target.value})};sr.appendChild(si);
  if(S.search){var xb=sp('','×');styl(xb,{cursor:'pointer',color:'#44445a',paddingLeft:'4px',flexShrink:0});xb.onclick=function(){set({search:''})};sr.appendChild(xb)}
  hdr.appendChild(sr);
  var cEl=dv('cats');['Alle','WoW','MMO','RPG','Shooter','Andere'].forEach(function(c){var ct=mk('div','cat'+(S.cat===c?' on':''),c);ct.onclick=function(){set({cat:c})};cEl.appendChild(ct)});
  hdr.appendChild(cEl);app.appendChild(hdr);
  var con=dv('content');
  if(vp==='chars')con.appendChild(pgChars());else if(vp==='weekly')con.appendChild(pgWeekly());else if(vp==='goals')con.appendChild(pgGoals());else if(vp==='achievements')con.appendChild(pgAch());else if(vp==='notes')con.appendChild(pgNotes());
  app.appendChild(con);
  var fw=dv('fabw');
  if(S.fab){var fm=dv('fabm');[{l:'Neuen Charakter',m:S.chars.length>=4?'upgrade':'char'},{l:sw?'Weekly starten':'Ziel hinzufügen',m:'goal'},{l:'Notiz schreiben',m:'note'}].forEach(function(it){var b=bt('fabi',it.l,null);(function(m){b.onclick=function(){set({modal:m,fab:false})}})(it.m);fm.appendChild(b)});fw.appendChild(fm)}
  var fb=bt('fabb'+(S.fab?' open':''),S.fab?'×':'+',function(){set({fab:!S.fab})});fw.appendChild(fb);app.appendChild(fw);
  var ne=dv('nav');nv.forEach(function(n){var b=bt('nb'+(vp===n.k?' on':''),n.l,null);(function(k){b.onclick=function(){set({page:k,fab:false})}})(n.k);ne.appendChild(b)});app.appendChild(ne);
  if(S.modal){var ov=dv('ov');ov.onclick=function(e){if(e.target===ov)set({modal:null})};if(S.modal==='char')ov.appendChild(mChar());else if(S.modal==='goal')ov.appendChild(mGoal());else if(S.modal==='note')ov.appendChild(mNote());else if(S.modal==='editchar')ov.appendChild(mEditChar());else if(S.modal==='upgrade')ov.appendChild(modalUpgrade());else if(S.modal==='gold')ov.appendChild(modalGold(S.goldCharId));app.appendChild(ov)}
}
render();
showToastIfNeeded();
</script>
